# Auto-responds to review comments (CodeRabbit bot + human) on AI-generated PRs.
# Applies fixes, validates tests pass, re-runs quality gate, and pushes.
name: Coverage Agent - Respond to Reviews

on:
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: coverage-agent-respond-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  respond:
    if: contains(github.event.pull_request.labels.*.name, 'ai-generated')
    timeout-minutes: 15
    runs-on: self-hosted
    environment:
      name: internal-ci
    container:
      # python:3.10.18-bullseye pinned to digest for security (amd64)
      image: python:3.10.18-bullseye@sha256:4e96d6c7c610e5b2a46ff8a36cc76a159d57a5b865d580eda29d51afdc1a1923
      env:
        DOCKER_HOST: "tcp://docker:2375"
        DOCKER_TLS_CERTDIR: ""
    services:
      docker:
        image: docker:29.2.1-dind@sha256:2658fda9e8779b94ea1581f4d25214dac9ed144b407902842e5328cce8f861f5
        env:
          DOCKER_TLS_CERTDIR: ""
          DOCKER_DRIVER: overlay2
        options: --privileged --memory=4g --cpus=2
        ports:
          - 2375:2375
    steps:
      - name: Install Docker CLI and dependencies
        run: |
          apt-get update
          apt-get install -y ca-certificates curl gnupg git-lfs

          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null

          apt-get update
          apt-get install -y docker-ce-cli

      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install agent dependencies
        run: pip install -r src/agent_requirements.txt

      - name: Configure git
        run: |
          git config user.name "coverage-agent[bot]"
          git config user.email "coverage-agent[bot]@users.noreply.github.com"

      - name: Respond to review comment
        run: |
          python -m coverage_agent.respond \
            --pr-number ${{ github.event.pull_request.number }} \
            --comment-id ${{ github.event.comment.id }} \
            --provider ${{ vars.AGENT_LLM_PROVIDER || 'nemotron' }}
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_NIM_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: src/scripts
