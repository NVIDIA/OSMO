# AI coverage agent: analyzes coverage gaps, generates tests, validates them,
# and opens a PR for human review. Runs daily on weekdays.
name: Coverage Agent

on:
  # TODO: Remove pull_request trigger after testing — keep only schedule + workflow_dispatch
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays 6 AM UTC (max 1 PR/day)
  workflow_dispatch:
    inputs:
      max_targets:
        description: 'Max files to target'
        default: '3'
      provider:
        description: 'LLM provider'
        type: choice
        options:
          - nemotron
          - claude
          - openai
        default: nemotron
      dry_run:
        description: 'Generate but do not create PR'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: coverage-agent
  cancel-in-progress: true

jobs:
  generate-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          lfs: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: src/ui/package.json

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@4fd964a13a440a8aeb0be47350db2fc640f19ca8
        with:
          bazelisk-cache: true
          bazelisk-version: 1.27.0
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          external-cache: |
            manifest:
              # Python dependencies
              osmo_python_deps: src/locked_requirements.txt
              osmo_tests_python_deps: src/tests/locked_requirements.txt
              osmo_mypy_deps: bzl/mypy/locked_requirements.txt
              pylint_python_deps: bzl/linting/locked_requirements.txt

              # Go dependencies
              io_bazel_rules_go: src/runtime/go.mod
              bazel_gazelle: src/runtime/go.sum

      - name: Run backend coverage
        # No DinD on github-hosted runners — testcontainer integration tests will fail.
        # That's fine: we only need LCOV from unit + Go tests for now.
        continue-on-error: true
        run: |
          bazel coverage \
            --combined_report=lcov \
            --remote_cache=${{ secrets.BAZEL_REMOTE_CACHE_URL }} \
            --discard_analysis_cache \
            --notrack_incremental_state \
            --nokeep_state_after_build \
            --test_output=errors \
            -- \
            //...

      - name: Run UI coverage
        working-directory: src/ui
        continue-on-error: true
        run: |
          pnpm install --frozen-lockfile
          npx vitest run --coverage --coverage.reporter=lcov --coverage.reporter=text || true

      - name: Install agent dependencies
        run: pip install -r src/agent_requirements.txt

      - name: Configure git
        run: |
          git config user.name "coverage-agent[bot]"
          git config user.email "coverage-agent[bot]@users.noreply.github.com"

      - name: Run coverage agent
        run: |
          PYTHONPATH=src/scripts python -m coverage_agent.main \
            --lcov-path bazel-out/_coverage/_coverage_report.dat \
            --ui-lcov-path src/ui/coverage/lcov.info \
            --max-targets ${{ inputs.max_targets || '3' }} \
            --provider ${{ inputs.provider || 'claude' }} \
            ${{ (inputs.dry_run == true || github.event_name == 'pull_request') && '--dry-run' || '' }}
        env:
          AGENT_API_KEY: ${{ secrets.NVIDIA_NIM_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_NIM_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
