# Reproduces the /var/lib/docker disk-fill issue on Brev instances with small root filesystems.
# nvcr.io/nvidia/pytorch:24.12-py3 is ~25 GB and requires an NGC registry credential.
#
# Prerequisites:
#   Register your NGC API key once after OSMO setup:
#     osmo credential set my-ngc-cred \
#         --type REGISTRY \
#         --payload registry=nvcr.io \
#         username='$oauthtoken' \
#         auth=<your_ngc_api_key>
#   OSMO will automatically use this credential when pulling from nvcr.io.
#
# To reproduce the bug:   deploy brev launchable WITHOUT the data-root fix, then submit this workflow.
#                         Expected: workflow stuck in Pending/Failed; KIND cluster may become unresponsive.
# To verify the fix:      deploy brev launchable WITH the data-root fix, then submit this workflow.
#                         Expected: workflow completes and prints PyTorch version.
#
# Submit with:
#   osmo workflow submit disk-fill-test.yaml

workflow:
  name: disk-fill-test
  resources:
    default:
      cpu: 1
      memory: 2Gi
      storage: 1Gi
  tasks:
  - name: large-image
    image: nvcr.io/nvidia/nemo:24.12
    command: ["python3"]
    args: ["-c", "import nemo; print(f'NeMo {nemo.__version__} running on OSMO — disk fix verified')"]
