{{- if .Values.services.taskGroupController.enabled }}
{{$name := or .Values.global.name .Release.Name }}
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Values.global.agentNamespace }}
  name: {{ .Values.services.taskGroupController.serviceName }}
  labels:
    {{- include "backend-operator.labels" . | nindent 4 }}
    app: {{ .Values.services.taskGroupController.serviceName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.services.taskGroupController.serviceName }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.taskGroupController.serviceName }}
        {{- with .Values.services.taskGroupController.extraPodLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.services.taskGroupController.extraPodAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      serviceAccountName: {{ include "backend-operator.taskGroupController.serviceAccountName" . }}
      nodeSelector:
        {{- range $k, $v := .Values.global.nodeSelector }}
        {{ $k }}: {{ $v }}
        {{- end }}
        {{- range $k, $v := .Values.services.taskGroupController.nodeSelector }}
        {{ $k }}: {{ $v }}
        {{- end }}
      tolerations:
      {{- toYaml .Values.global.tolerations | nindent 6 }}
      containers:
      - name: {{ .Values.services.taskGroupController.serviceName }}
        image: {{ .Values.global.osmoImageLocation }}/{{ .Values.services.taskGroupController.imageName }}:{{ .Values.global.osmoImageTag }}
        imagePullPolicy: {{ .Values.services.taskGroupController.imagePullPolicy }}
        command:
        - taskgroup_controller
        args:
        - --metrics-bind-address
        - :8080
        - --health-probe-bind-address
        - :8081
        - --leader-elect={{ .Values.services.taskGroupController.leaderElection }}
        {{- if .Values.services.taskGroupController.statusReportAddress }}
        - --status-report-address
        - {{ .Values.services.taskGroupController.statusReportAddress | quote }}
        {{- end }}
        {{- range $arg := .Values.services.taskGroupController.extraArgs }}
        - {{ $arg | quote }}
        {{- end }}
        {{- if or .Values.services.taskGroupController.statusTokenSecretName .Values.services.taskGroupController.extraEnvs }}
        env:
        {{- if .Values.services.taskGroupController.statusTokenSecretName }}
        - name: OSMO_TASKGROUP_STATUS_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.services.taskGroupController.statusTokenSecretName }}
              key: {{ .Values.services.taskGroupController.statusTokenSecretKey }}
        {{- end }}
        {{- with .Values.services.taskGroupController.extraEnvs }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: 8080
        - name: health
          containerPort: 8081
        {{- with .Values.services.taskGroupController.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.services.taskGroupController.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
      {{- with .Values.services.taskGroupController.extraSidecarContainers }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.services.taskGroupController.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
