{{- if .Values.envoy.enabled }}

{{- include "gateway.envoy-config" . }}
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gateway.fullname" . }}-envoy
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- include "gateway.componentLabels" (dict "component" "envoy" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.envoy.replicas }}
  selector:
    matchLabels:
      {{- include "gateway.componentLabels" (dict "component" "envoy" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gateway.componentLabels" (dict "component" "envoy" "context" .) | nindent 8 }}
        {{- with .Values.envoy.extraPodLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/envoy-config: {{ .Values.envoy | toYaml | sha256sum }}
        {{- include "gateway.extra-annotations" .Values.envoy | nindent 8 }}
    spec:
      {{- with .Values.envoy.topologySpreadConstraints }}
      topologySpreadConstraints:
      {{- range . }}
      - topologyKey: {{ .topologyKey }}
        {{- range $key, $value := . }}
        {{- if ne $key "topologyKey" }}
        {{ $key }}: {{ $value }}
        {{- end }}
        {{- end }}
        labelSelector:
          matchLabels:
            {{- include "gateway.componentLabels" (dict "component" "envoy" "context" $) | nindent 12 }}
      {{- end }}
      {{- end }}
      {{- with .Values.envoy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.envoy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      serviceAccountName: {{ include "gateway.serviceAccountName" (dict "serviceAccountName" .Values.envoy.serviceAccountName "global" .Values.global) }}
      containers:
      - name: envoy
        securityContext:
          {{- toYaml .Values.envoy.securityContext | nindent 10 }}
        image: "{{ .Values.envoy.image }}"
        imagePullPolicy: {{ .Values.envoy.imagePullPolicy }}
        args:
          - -c
          - /var/config/config.yaml
          - --log-level
          - {{ .Values.envoy.logLevel | default "info" }}
        ports:
          {{- if .Values.envoy.ssl.enabled }}
          - containerPort: 443
            name: envoy-http
          {{- else }}
          - containerPort: {{ .Values.envoy.listenerPort }}
            name: envoy-http
          {{- end }}
          - containerPort: 9901
            name: envoy-admin
        volumeMounts:
          - mountPath: /var/config
            name: envoy-config
            readOnly: true
          {{- if .Values.envoy.ssl.enabled }}
          - name: ssl-cert
            mountPath: /etc/ssl/certs/cert.crt
            subPath: cert.crt
          - name: ssl-key
            mountPath: /etc/ssl/private/private_key.key
            subPath: private_key.key
          {{- end }}
          {{- if .Values.tls.enabled }}
          - name: gateway-tls-ca
            mountPath: /etc/gateway-tls
            readOnly: true
          {{- end }}
          {{- with .Values.envoy.extraVolumeMounts }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        resources:
          {{- toYaml .Values.envoy.resources | nindent 10 }}
        {{- with .Values.envoy.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.envoy.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.envoy.startupProbe }}
        startupProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      volumes:
        - name: envoy-config
          configMap:
            name: {{ include "gateway.fullname" . }}-envoy-config
        {{- if .Values.tls.enabled }}
        - name: gateway-tls-ca
          secret:
            secretName: {{ include "gateway.fullname" . }}-ca-tls
            items:
            - key: ca.crt
              path: ca.crt
        {{- end }}
        {{- if .Values.envoy.ssl.enabled }}
        - name: ssl-cert
          secret:
            secretName: {{ .Values.envoy.ssl.cert.secretName }}
            items:
            - key: {{ .Values.envoy.ssl.cert.secretKey }}
              path: cert.crt
        - name: ssl-key
          secret:
            secretName: {{ .Values.envoy.ssl.privateKey.secretName }}
            items:
            - key: {{ .Values.envoy.ssl.privateKey.secretKey }}
              path: private_key.key
        {{- end }}
        {{- with .Values.envoy.extraVolumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "gateway.fullname" . }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- include "gateway.componentLabels" (dict "component" "envoy" "context" .) | nindent 4 }}
spec:
  ports:
    - port: 80
      targetPort: envoy-http
      protocol: TCP
      name: http
  selector:
    {{- include "gateway.componentLabels" (dict "component" "envoy" "context" .) | nindent 4 }}

---

{{- if .Values.envoy.scaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "gateway.fullname" . }}-envoy
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- include "gateway.componentLabels" (dict "component" "envoy" "context" .) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "gateway.fullname" . }}-envoy
  minReplicas: {{ .Values.envoy.scaling.minReplicas | default .Values.envoy.replicas }}
  maxReplicas: {{ .Values.envoy.scaling.maxReplicas | default 6 }}
  metrics:
  - type: ContainerResource
    containerResource:
      name: cpu
      container: envoy
      target:
        type: Utilization
        averageUtilization: {{ .Values.envoy.scaling.hpaCpuTarget | default 80 }}
  - type: ContainerResource
    containerResource:
      name: memory
      container: envoy
      target:
        type: Utilization
        averageUtilization: {{ .Values.envoy.scaling.hpaMemoryTarget | default 80 }}
{{- end }}

---

{{- if .Values.envoy.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gateway.fullname" . }}
  annotations:
    {{- if .Values.envoy.ingress.albAnnotations.enabled }}
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: osmo
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.envoy.ingress.albAnnotations.sslCertArn }}
    {{- end }}
    {{- range $k, $v := .Values.envoy.ingress.annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.envoy.ingress.ingressClass }}
  rules:
  - host: {{ .Values.envoy.hostname }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "gateway.fullname" . }}
            port:
              number: 80
  {{- if .Values.envoy.ingress.sslEnabled }}
  tls:
  - hosts:
    - {{ .Values.envoy.hostname }}
    secretName: {{ .Values.envoy.ingress.sslSecret | default "osmo-tls" }}
  {{- end }}
{{- end }}

{{- end }}
