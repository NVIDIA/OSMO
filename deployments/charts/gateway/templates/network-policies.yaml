{{/*
NetworkPolicies restricting ingress to upstream service pods so that only
the gateway Envoy pods can reach them. Combined with TLS on the upstream
connections this provides both identity (who may connect) and
confidentiality (encrypted transport).
*/}}

{{- if .Values.networkPolicies.enabled }}

{{- $envoyLabels := (include "gateway.componentLabels" (dict "component" "envoy" "context" .) | fromYaml) }}

{{- range .Values.networkPolicies.upstreams }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gateway.fullname" $ }}-allow-envoy-to-{{ .name }}
  labels:
    {{- include "gateway.labels" $ | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml .podSelector | nindent 6 }}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          {{- toYaml $envoyLabels | nindent 10 }}
    ports:
    - port: {{ .port | default 8000 }}
      protocol: TCP
{{- end }}

{{- end }}
