{{- if .Values.oauth2Proxy.enabled }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gateway.fullname" . }}-oauth2-proxy
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- include "gateway.componentLabels" (dict "component" "oauth2-proxy" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.oauth2Proxy.replicas }}
  selector:
    matchLabels:
      {{- include "gateway.componentLabels" (dict "component" "oauth2-proxy" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gateway.componentLabels" (dict "component" "oauth2-proxy" "context" .) | nindent 8 }}
      annotations:
        {{- include "gateway.extra-annotations" .Values.oauth2Proxy | nindent 8 }}
    spec:
      {{- with .Values.oauth2Proxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.oauth2Proxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      serviceAccountName: {{ include "gateway.serviceAccountName" (dict "serviceAccountName" .Values.oauth2Proxy.serviceAccountName "global" .Values.global) }}
      containers:
      - name: oauth2-proxy
        image: "{{ .Values.oauth2Proxy.image }}"
        imagePullPolicy: {{ .Values.oauth2Proxy.imagePullPolicy }}
        securityContext:
          {{- toYaml .Values.oauth2Proxy.securityContext | nindent 10 }}
        args:
          {{- if .Values.oauth2Proxy.useKubernetesSecrets }}
          - --client-secret-file=/etc/oauth2-proxy/client-secret
          - --cookie-secret-file=/etc/oauth2-proxy/cookie-secret
          {{- else }}
          - --config={{ .Values.oauth2Proxy.secretPaths.cookieSecret }}
          {{- end }}
          - --http-address=0.0.0.0:{{ .Values.oauth2Proxy.httpPort }}
          - --metrics-address=0.0.0.0:{{ .Values.oauth2Proxy.metricsPort }}
          - --reverse-proxy=true
          - --provider={{ .Values.oauth2Proxy.provider }}
          - --oidc-issuer-url={{ .Values.oauth2Proxy.oidcIssuerUrl }}
          - --client-id={{ .Values.oauth2Proxy.clientId }}
          - --cookie-secure={{ .Values.oauth2Proxy.cookieSecure }}
          - --cookie-name={{ .Values.oauth2Proxy.cookieName }}
          {{- if .Values.oauth2Proxy.cookieDomain }}
          - --cookie-domain={{ .Values.oauth2Proxy.cookieDomain }}
          {{- end }}
          - --cookie-expire={{ .Values.oauth2Proxy.cookieExpire }}
          - --cookie-refresh={{ .Values.oauth2Proxy.cookieRefresh }}
          - --scope={{ .Values.oauth2Proxy.scope }}
          - --email-domain=*
          - --set-xauthrequest=true
          - --set-authorization-header=true
          - --pass-access-token={{ .Values.oauth2Proxy.passAccessToken }}
          {{- if .Values.oauth2Proxy.redisSessionStore }}
          - --session-store-type=redis
          - --redis-connection-url={{ if .Values.oauth2Proxy.redis.tlsEnabled }}rediss{{ else }}redis{{ end }}://{{ .Values.oauth2Proxy.redis.serviceName }}:{{ .Values.oauth2Proxy.redis.port | default 6379 }}/{{ .Values.oauth2Proxy.redis.dbNumber | default 0 }}
          {{- end }}
          - --upstream=static://200
          - --redirect-url=https://{{ .Values.envoy.hostname }}/oauth2/callback
          - --silence-ping-logging=true
          - --skip-provider-button=true
          - --api-route=/api/.+
          {{- range .Values.oauth2Proxy.extraArgs }}
          - {{ . }}
          {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.oauth2Proxy.httpPort }}
        - name: oauth2-metrics
          containerPort: {{ .Values.oauth2Proxy.metricsPort }}
        livenessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          {{- toYaml .Values.oauth2Proxy.resources | nindent 10 }}
        volumeMounts:
          {{- if .Values.oauth2Proxy.useKubernetesSecrets }}
          - name: oauth2-proxy-secrets
            mountPath: /etc/oauth2-proxy
            readOnly: true
          {{- end }}
          {{- with .Values.oauth2Proxy.extraVolumeMounts }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
      volumes:
        {{- if .Values.oauth2Proxy.useKubernetesSecrets }}
        - name: oauth2-proxy-secrets
          secret:
            secretName: {{ .Values.oauth2Proxy.secretName | default "oauth2-proxy-secrets" }}
            items:
            - key: {{ .Values.oauth2Proxy.clientSecretKey | default "client_secret" }}
              path: client-secret
            - key: {{ .Values.oauth2Proxy.cookieSecretKey | default "cookie_secret" }}
              path: cookie-secret
        {{- end }}
        {{- with .Values.oauth2Proxy.extraVolumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "gateway.fullname" . }}-oauth2-proxy
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- include "gateway.componentLabels" (dict "component" "oauth2-proxy" "context" .) | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.oauth2Proxy.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.oauth2Proxy.metricsPort }}
      targetPort: oauth2-metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "gateway.componentLabels" (dict "component" "oauth2-proxy" "context" .) | nindent 4 }}

{{- end }}
