{{- if .Values.rateLimit.enabled }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.fullname" . }}-ratelimit-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
data:
  config.yaml: |
    domain: {{ .Values.rateLimit.config.domain | default "ratelimit" }}
    descriptors:
      {{- toYaml .Values.rateLimit.config.descriptors | nindent 6 }}

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gateway.fullname" . }}-ratelimit
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- include "gateway.componentLabels" (dict "component" "ratelimit" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.rateLimit.replicas }}
  selector:
    matchLabels:
      {{- include "gateway.componentLabels" (dict "component" "ratelimit" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gateway.componentLabels" (dict "component" "ratelimit" "context" .) | nindent 8 }}
      annotations:
        checksum/ratelimit-config: {{ .Values.rateLimit.config | toYaml | sha256sum }}
    spec:
      {{- with .Values.rateLimit.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rateLimit.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      containers:
      - name: ratelimit
        image: "{{ .Values.rateLimit.image }}"
        imagePullPolicy: "{{ .Values.rateLimit.imagePullPolicy }}"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1001
        command: ["sh", "-c"]
        args:
          {{- if .Values.rateLimit.args }}
          {{- if kindIs "slice" .Values.rateLimit.args }}
          {{- range .Values.rateLimit.args }}
          - {{ . }}
          {{- end }}
          {{- else }}
          - {{ .Values.rateLimit.args }}
          {{- end }}
          {{- else }}
          - /bin/ratelimit
          {{- end }}
        resources:
          {{- toYaml .Values.rateLimit.resources | nindent 10 }}
        env:
        - name: LOG_LEVEL
          value: info
        - name: REDIS_SOCKET_TYPE
          value: tcp
        - name: REDIS_URL
          value: {{ .Values.rateLimit.redis.serviceName }}:{{ .Values.rateLimit.redis.port | default 6379 }}
        - name: REDIS_TLS
          value: {{ .Values.rateLimit.redis.tlsEnabled | default true | quote }}
        - name: USE_STATSD
          value: "false"
        - name: RUNTIME_ROOT
          value: /data
        - name: RUNTIME_SUBDIRECTORY
          value: ratelimit
        - name: RUNTIME_WATCH_ROOT
          value: "false"
        - name: RUNTIME_IGNOREDOTFILES
          value: "true"
        - name: HOST
          value: "::"
        - name: GRPC_HOST
          value: "::"
        ports:
        - name: grpc
          containerPort: {{ .Values.rateLimit.grpcPort }}
        - name: http
          containerPort: {{ .Values.rateLimit.httpPort }}
        volumeMounts:
        - name: ratelimit-config
          mountPath: /data/ratelimit/config
        livenessProbe:
          tcpSocket:
            port: {{ .Values.rateLimit.grpcPort }}
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: ratelimit-config
        configMap:
          name: {{ include "gateway.fullname" . }}-ratelimit-config
          defaultMode: 420
          items:
          - key: config.yaml
            path: config.yaml

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "gateway.fullname" . }}-ratelimit
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- include "gateway.componentLabels" (dict "component" "ratelimit" "context" .) | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.rateLimit.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.rateLimit.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "gateway.componentLabels" (dict "component" "ratelimit" "context" .) | nindent 4 }}

{{- end }}
