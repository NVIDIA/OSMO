{{/*
Self-signed TLS certificates for gateway ↔ upstream service communication.

On first install Helm generates a CA and a server certificate signed by it.
On subsequent upgrades the existing secret is reused so pods are not
unnecessarily restarted. The CA cert is mounted in the Envoy pods (trusted
root) and the server cert+key are mounted in the upstream service pods.
*/}}

{{- if .Values.tls.enabled }}

{{- $secretName := printf "%s-upstream-tls" (include "gateway.fullname" .) }}
{{- $caSecretName := printf "%s-ca-tls" (include "gateway.fullname" .) }}

{{/* Collect all DNS SANs for the server certificate */}}
{{- $altNames := list }}
{{- range .Values.tls.sans }}
{{- $altNames = append $altNames . }}
{{- end }}

{{/* Try to reuse existing secrets so certs survive helm upgrade */}}
{{- $existingCA := lookup "v1" "Secret" .Release.Namespace $caSecretName }}
{{- $existingCert := lookup "v1" "Secret" .Release.Namespace $secretName }}

{{- $ca := "" }}
{{- $cert := "" }}

{{- if and $existingCA $existingCert }}
  {{/* Reuse the existing CA and server cert */}}
  {{- $ca = dict "Cert" (index $existingCA.data "ca.crt" | b64dec) "Key" (index $existingCA.data "ca.key" | b64dec) }}
  {{- $cert = dict "Cert" (index $existingCert.data "tls.crt" | b64dec) "Key" (index $existingCert.data "tls.key" | b64dec) }}
{{- else }}
  {{/* Generate new self-signed CA and server cert */}}
  {{- $ca = genCA "osmo-gateway-ca" (int .Values.tls.validityDays) }}
  {{- $cert = genSignedCert "osmo-gateway" nil $altNames (int .Values.tls.validityDays) $ca }}
{{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $caSecretName }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
type: Opaque
data:
  ca.crt: {{ $ca.Cert | b64enc | quote }}
  ca.key: {{ $ca.Key | b64enc | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
  ca.crt: {{ $ca.Cert | b64enc | quote }}

{{- end }}
