# ============================================================================
# OSMO API Gateway — Default Values
#
# Deploys Envoy, OAuth2 Proxy, Authz, and Rate Limit as independent services,
# decoupled from the application pods.
# ============================================================================

global:
  osmoImageLocation: nvcr.io/nvidia/osmo
  osmoImageTag: latest
  imagePullSecret: null
  serviceAccountName: ""
  logs:
    enabled: true
    logLevel: DEBUG

nameOverride: ""
fullnameOverride: ""

# ============================================================================
# Envoy Proxy
# ============================================================================
envoy:
  enabled: true
  replicas: 2
  image: "envoyproxy/envoy:v1.29.0"
  imagePullPolicy: IfNotPresent
  logLevel: info
  listenerPort: 8080
  maxHeadersSizeKb: 128
  blockedIPs: []
  hostname: ""

  scaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    hpaCpuTarget: 80
    hpaMemoryTarget: 80

  ingress:
    enabled: false
    ingressClass: alb
    albAnnotations:
      enabled: false
      sslCertArn: ""
    sslEnabled: false
    sslSecret: osmo-tls
    annotations: {}

  ssl:
    enabled: false
    cert:
      secretName: envoy-ssl-cert
      secretKey: cert
    privateKey:
      secretName: envoy-ssl-cert
      secretKey: privateKey

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    runAsUser: 1001

  resources:
    requests:
      cpu: "200m"
      memory: "128Mi"
    limits:
      memory: "256Mi"

  livenessProbe:
    httpGet:
      path: /ready
      port: 9901
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
  readinessProbe:
    httpGet:
      path: /ready
      port: 9901
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
  startupProbe:
    httpGet:
      path: /ready
      port: 9901
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3

  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []
  extraPodAnnotations: {}
  extraPodLabels: {}
  extraVolumeMounts: []
  extraVolumes: []
  serviceAccountName: ""

  ## Identity Provider for JWKS discovery
  idp:
    host: ""

  ## Internal JWKS cluster (for the "osmo" JWT issuer — points to osmo-service)
  internalJwks:
    enabled: true
    cluster: osmo-service-jwks
    host: ""
    port: ""

  ## JWT configuration
  jwt:
    user_header: x-osmo-user
    providers: []
    # - issuer: ""
    #   audience: ""
    #   jwks_uri: ""
    #   user_claim: unique_name
    #   cluster: idp

  ## Paths that bypass authentication
  skipAuthPaths:
  - /api/version
  - /api/auth/login
  - /api/auth/keys
  - /api/auth/refresh_token
  - /api/auth/jwt/refresh_token
  - /api/auth/jwt/access_token
  - /client/version

  ## Route configuration for osmo-router upstream (with cookie affinity)
  routerRoute:
    prefix: /api/router
    timeout: 0s
    cookie:
      name: _osmo_router_affinity
      ttl: 60s

  ## Advanced service routes (osmo-service upstream).
  ## When empty, default routes to osmo-service for /api/ and /client/ are used.
  ## Each entry is a standard Envoy route YAML block.
  serviceRoutes: []

  ## Circuit breaker — max concurrent requests to osmo-service
  maxRequests: 100

# ============================================================================
# Upstream Services
# ============================================================================
upstreams:
  service:
    enabled: true
    host: osmo-service
    port: 80
  router:
    enabled: true
    host: osmo-router
    port: 80
  ui:
    enabled: true
    host: osmo-ui
    port: 80

# ============================================================================
# OAuth2 Proxy
# ============================================================================
oauth2Proxy:
  enabled: true
  replicas: 1
  image: "quay.io/oauth2-proxy/oauth2-proxy:v7.14.2"
  imagePullPolicy: IfNotPresent
  httpPort: 4180
  metricsPort: 44180
  provider: oidc
  oidcIssuerUrl: ""
  clientId: ""
  cookieName: _osmo_session
  cookieSecure: true
  cookieDomain: ""
  cookieExpire: 168h
  cookieRefresh: 1h
  scope: "openid email profile"
  passAccessToken: false
  redisSessionStore: true
  oidcEndSessionUrl: ""

  useKubernetesSecrets: false
  secretName: oauth2-proxy-secrets
  clientSecretKey: client_secret
  cookieSecretKey: cookie_secret
  secretPaths:
    clientSecret: /etc/oauth2-proxy/client-secret
    cookieSecret: /etc/oauth2-proxy/cookie-secret
  extraArgs: []

  redis:
    serviceName: ""
    port: 6379
    tlsEnabled: true
    dbNumber: 0

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    runAsUser: 1001
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      memory: "128Mi"

  nodeSelector: {}
  tolerations: []
  extraPodAnnotations: {}
  extraVolumeMounts: []
  extraVolumes: []
  serviceAccountName: ""

# ============================================================================
# Authorization Sidecar (gRPC)
# ============================================================================
authz:
  enabled: true
  replicas: 1
  imageName: "authz-sidecar"
  imagePullPolicy: Always
  grpcPort: 50052
  extraEnv: []

  postgres:
    serviceName: ""
    port: "5432"
    db: ""
    user: osmo
    password: ""
    sslMode: prefer
    maxConns: 10
    minConns: 2
    maxConnLifetimeMin: 5

  cache:
    ttl: 300
    maxSize: 1000

  configFile:
    enabled: false
  migration:
    enabled: false
    targetSchema: public

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    runAsUser: 10001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  livenessProbe:
    grpc:
      port: 50052
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 50052
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

  nodeSelector: {}
  tolerations: []
  extraPodAnnotations: {}
  extraVolumeMounts: []
  extraVolumes: []
  serviceAccountName: ""

# ============================================================================
# Rate Limiting
# ============================================================================
rateLimit:
  enabled: false
  replicas: 1
  image: envoyproxy/ratelimit:9d8d70a8
  imagePullPolicy: IfNotPresent
  grpcPort: 8091
  httpPort: 8090
  args: ""

  redis:
    serviceName: ""
    port: 6379
    tlsEnabled: true

  config:
    domain: ratelimit
    descriptors:
    - key: PATH
      rate_limit:
        unit: minute
        requests_per_unit: 1000
    - key: OSMO_USER
      rate_limit:
        unit: minute
        requests_per_unit: 500
    - key: workflow_artifact
      value: workflow_artifact_limit
      descriptors:
      - key: OSMO_USER
        rate_limit:
          unit: minute
          requests_per_unit: 20
    - key: workflow
      value: workflow_limit
      descriptors:
      - key: OSMO_USER
        rate_limit:
          unit: minute
          requests_per_unit: 150
    - key: workflow_artifact_path_limit
      rate_limit:
        unit: minute
        requests_per_unit: 500
    - key: task
      value: task_limit
      descriptors:
      - key: OSMO_USER
        rate_limit:
          unit: minute
          requests_per_unit: 150
    - key: task_path_limit
      rate_limit:
        unit: minute
        requests_per_unit: 500
    - key: resource
      value: resource_limit
      descriptors:
      - key: OSMO_USER
        rate_limit:
          unit: minute
          requests_per_unit: 100
    - key: resource_path_limit
      rate_limit:
        unit: minute
        requests_per_unit: 500
    - key: pool
      value: pool_limit
      descriptors:
      - key: OSMO_USER
        rate_limit:
          unit: minute
          requests_per_unit: 100
    - key: pool_path_limit
      rate_limit:
        unit: minute
        requests_per_unit: 500
    - key: refresh_token_path_limit
      rate_limit:
        unit: minute
        requests_per_unit: 500
    - key: client_pypi_path_limit
      rate_limit:
        unit: minute
        requests_per_unit: 200
    - key: client_path_limit
      rate_limit:
        unit: minute
        requests_per_unit: 500
    - key: version_path
      value: version_path_user_limit
      descriptors:
      - key: OSMO_USER
        rate_limit:
          unit: minute
          requests_per_unit: 300
    - key: version_path_limit
      rate_limit:
        unit: minute
        requests_per_unit: 10000

  resources:
    requests:
      cpu: "0.1"
      memory: "200Mi"
    limits:
      memory: "200Mi"

  nodeSelector: {}
  tolerations: []

# ============================================================================
# Network Policies
# ============================================================================
networkPolicies:
  enabled: false
  upstreams:
  - name: osmo-service
    podSelector:
      app: osmo-service
    port: 8000
  - name: osmo-router
    podSelector:
      app: osmo-router
    port: 8000
  - name: osmo-ui
    podSelector:
      app: osmo-ui
    port: 8000

# ============================================================================
# TLS — self-signed certificates for gateway ↔ upstream communication
#
# When enabled, Helm generates a self-signed CA and server certificate.
# - The CA cert is mounted in Envoy pods (trusted root for upstream TLS).
# - The server cert+key are mounted in the upstream service pods via their
#   extraVolumeMounts / extraVolumes values.
# - Envoy upstream clusters use TLS transport sockets to connect.
# ============================================================================
tls:
  enabled: false
  validityDays: 365
  ## DNS Subject Alternative Names for the server certificate.
  ## Must include every K8s Service name the upstream pods are reachable on.
  ## Override in your values file to include namespace-qualified names.
  sans:
  - osmo-service
  - osmo-router
  - osmo-ui

# ============================================================================
# Extra ConfigMaps (e.g. Vault agent configs)
# ============================================================================
extraConfigMaps: []
