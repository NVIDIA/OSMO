{{/*
Gateway -> upstream TLS.

Default mode (gateway.tls.enabled=true, certManager.enabled=false):
  Each upstream pod runs an init container that generates an ephemeral
  self-signed cert into an emptyDir. uvicorn serves HTTPS with that cert.
  Envoy connects with TLS but does NOT validate (common_tls_context: {} on
  the upstream cluster). The wire is encrypted; identity verification is
  handled by NetworkPolicy + Kubernetes RBAC, not by cert pinning.

  This template emits nothing in default mode. The init containers and
  emptyDir volumes are wired into each Deployment via helpers in
  _gateway-helpers.tpl, and the Envoy CDS uses an empty
  common_tls_context. Result: no Secrets, no Jobs, no CA, no rotation —
  cert lifecycle is tied to pod lifecycle.

cert-manager mode (gateway.tls.enabled=true, certManager.enabled=true):
  cert-manager manages a CA and per-service leaf certs as proper Secrets.
  Envoy validates upstreams against that CA. Use this when you need
  validated/audited TLS or want to plug in an enterprise PKI.
*/}}

{{- if .Values.gateway.tls.enabled }}
{{- if .Values.gateway.tls.certManager.enabled }}
{{- $gw := .Values.gateway }}
{{- $gwName := include "osmo.gateway-name" . }}
{{- $ns := .Release.Namespace }}

{{- $upstreams := list
    (dict "name" "osmo-service" "secret" "osmo-service-tls"
          "dnsNames" (list "osmo-service" (printf "osmo-service.%s" $ns) (printf "osmo-service.%s.svc" $ns) (printf "osmo-service.%s.svc.cluster.local" $ns)))
    (dict "name" "osmo-router" "secret" "osmo-router-tls"
          "dnsNames" (list "osmo-router" "osmo-router-headless"
                            (printf "osmo-router.%s" $ns) (printf "osmo-router.%s.svc" $ns) (printf "osmo-router.%s.svc.cluster.local" $ns)
                            (printf "osmo-router-headless.%s" $ns) (printf "osmo-router-headless.%s.svc" $ns) (printf "osmo-router-headless.%s.svc.cluster.local" $ns)))
    (dict "name" "osmo-agent" "secret" "osmo-agent-tls"
          "dnsNames" (list "osmo-agent" (printf "osmo-agent.%s" $ns) (printf "osmo-agent.%s.svc" $ns) (printf "osmo-agent.%s.svc.cluster.local" $ns)))
    (dict "name" "osmo-logger" "secret" "osmo-logger-tls"
          "dnsNames" (list "osmo-logger" (printf "osmo-logger.%s" $ns) (printf "osmo-logger.%s.svc" $ns) (printf "osmo-logger.%s.svc.cluster.local" $ns)))
}}

{{- if not $gw.tls.certManager.issuerRef }}
{{/* No external issuer — create a self-signed Issuer + a CA Certificate
     and a CA Issuer that signs the per-service certs. */}}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $gwName }}-selfsigned
spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $gwName }}-ca
spec:
  isCA: true
  commonName: {{ $gwName }}-ca
  secretName: {{ $gwName }}-ca-tls
  duration: {{ $gw.tls.caDuration | default "87600h" }}
  renewBefore: {{ $gw.tls.caRenewBefore | default "720h" }}
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ $gwName }}-selfsigned
    kind: Issuer
    group: cert-manager.io

---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $gwName }}-ca
spec:
  ca:
    secretName: {{ $gwName }}-ca-tls
{{- end }}

{{- $issuerName := $gw.tls.certManager.issuerRef.name | default (printf "%s-ca" $gwName) }}
{{- $issuerKind := $gw.tls.certManager.issuerRef.kind | default "Issuer" }}
{{- $issuerGroup := $gw.tls.certManager.issuerRef.group | default "cert-manager.io" }}

{{- range $u := $upstreams }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $u.name }}
spec:
  secretName: {{ $u.secret }}
  duration: {{ $gw.tls.certDuration | default "43800h" }}
  renewBefore: {{ $gw.tls.certRenewBefore | default "360h" }}
  commonName: {{ $u.name }}
  dnsNames:
    {{- range $u.dnsNames }}
    - {{ . }}
    {{- end }}
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ $issuerName }}
    kind: {{ $issuerKind }}
    group: {{ $issuerGroup }}
{{- end }}

{{- end }}{{/* end certManager.enabled */}}
{{- end }}{{/* end gateway.tls.enabled */}}
