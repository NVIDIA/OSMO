{{- if .Values.services.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.operator.serviceName }}
  labels:
    app: {{ .Values.services.operator.serviceName }}
spec:
  replicas: {{ .Values.services.operator.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.services.operator.serviceName }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.operator.serviceName }}
        {{- with .Values.services.operator.extraPodLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "osmo.extra-annotations" .Values.services.operator | nindent 8 }}
    spec:
      nodeSelector:
        {{- range $k, $v := .Values.global.nodeSelector }}
        {{ $k }}: {{ $v }}
        {{- end }}
        {{- range $k, $v := .Values.services.operator.nodeSelector }}
        {{ $k }}: {{ $v }}
        {{- end }}
      tolerations:
      {{ toYaml .Values.services.operator.tolerations | nindent 8 }}
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      serviceAccountName: {{ include "osmo.service-account-name" (dict "serviceAccountName" .Values.services.operator.serviceAccountName "Values" .Values) }}
      containers:
      - name: {{ .Values.services.operator.serviceName }}
        image: {{ .Values.global.osmoImageLocation }}/{{ .Values.services.operator.imageName }}:{{ .Values.services.operator.imageTag | default .Values.global.osmoImageTag }}
        imagePullPolicy: {{ .Values.services.operator.imagePullPolicy }}
        command:
        - operator_service
        args:
        - --host
        - http://0.0.0.0:{{ .Values.services.operator.grpcPort }}
        - --http-host
        - http://0.0.0.0:{{ .Values.services.operator.httpPort }}
        - --log-level
        - {{ .Values.global.logs.logLevel }}
        {{- if .Values.services.operator.enableReflection }}
        - --enable-reflection
        {{- end }}
        {{- range $arg := .Values.services.operator.extraArgs }}
        - {{ $arg | quote }}
        {{- end }}
        env:
        {{- include "osmo.extra-env" .Values.services.operator | nindent 8 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1001
        ports:
        - name: grpc
          containerPort: {{ .Values.services.operator.grpcPort }}
        - name: http
          containerPort: {{ .Values.services.operator.httpPort }}
        {{- if .Values.services.operator.extraVolumeMounts }}
        volumeMounts:
        {{- include "osmo.extra-volume-mounts" .Values.services.operator | nindent 8 }}
        {{- end }}
        resources:
        {{- toYaml .Values.services.operator.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            port: http
            path: /healthz
          failureThreshold: 3
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            port: http
            path: /healthz
          failureThreshold: 3
          periodSeconds: 10
          timeoutSeconds: 5
      {{- include "osmo.extra-sidecars" .Values.services.operator | nindent 6 }}
      {{- if .Values.services.operator.extraVolumes }}
      volumes:
      {{- include "osmo.extra-volumes" .Values.services.operator | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.operator.serviceName }}
  labels:
    app: {{ .Values.services.operator.serviceName }}
spec:
  ports:
  - port: {{ .Values.services.operator.grpcPort }}
    targetPort: grpc
    protocol: TCP
    name: grpc
  - port: {{ .Values.services.operator.httpPort }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: {{ .Values.services.operator.serviceName }}
{{- end }}
