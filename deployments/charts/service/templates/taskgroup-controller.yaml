{{- if .Values.services.taskGroupController.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.taskGroupController.serviceName }}
  labels:
    app: {{ .Values.services.taskGroupController.serviceName }}
spec:
  replicas: {{ .Values.services.taskGroupController.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.services.taskGroupController.serviceName }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.taskGroupController.serviceName }}
        {{- with .Values.services.taskGroupController.extraPodLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "osmo.extra-annotations" .Values.services.taskGroupController | nindent 8 }}
    spec:
      nodeSelector:
        {{- range $k, $v := .Values.global.nodeSelector }}
        {{ $k }}: {{ $v }}
        {{- end }}
        {{- range $k, $v := .Values.services.taskGroupController.nodeSelector }}
        {{ $k }}: {{ $v }}
        {{- end }}
      tolerations:
      {{ toYaml .Values.services.taskGroupController.tolerations | nindent 8 }}
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      serviceAccountName: {{ include "osmo.service-account-name" (dict "serviceAccountName" .Values.services.taskGroupController.serviceAccountName "Values" .Values) }}
      containers:
      - name: {{ .Values.services.taskGroupController.serviceName }}
        image: {{ .Values.global.osmoImageLocation }}/{{ .Values.services.taskGroupController.imageName }}:{{ .Values.services.taskGroupController.imageTag | default .Values.global.osmoImageTag }}
        imagePullPolicy: {{ .Values.services.taskGroupController.imagePullPolicy }}
        command:
        - taskgroup_controller
        args:
        - --metrics-bind-address
        - :8080
        - --health-probe-bind-address
        - :8081
        - --leader-elect={{ .Values.services.taskGroupController.leaderElection }}
        {{- if .Values.services.taskGroupController.statusReportAddress }}
        - --status-report-address
        - {{ .Values.services.taskGroupController.statusReportAddress }}
        {{- else if .Values.services.taskGroupStatusReceiver.enabled }}
        - --status-report-address
        - {{ printf "%s:%d" .Values.services.taskGroupStatusReceiver.serviceName (int .Values.services.taskGroupStatusReceiver.grpcPort) }}
        {{- end }}
        {{- range $arg := .Values.services.taskGroupController.extraArgs }}
        - {{ $arg | quote }}
        {{- end }}
        env:
        {{- if .Values.services.taskGroupStatusReceiver.enabled }}
        - name: OSMO_TASKGROUP_STATUS_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ required "services.taskGroupStatusReceiver.sharedTokenSecretName is required when taskGroupStatusReceiver is enabled" .Values.services.taskGroupStatusReceiver.sharedTokenSecretName }}
              key: {{ .Values.services.taskGroupStatusReceiver.sharedTokenSecretKey }}
        {{- end }}
        {{- include "osmo.extra-env" .Values.services.taskGroupController | nindent 8 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1001
        ports:
        - name: metrics
          containerPort: 8080
        - name: health
          containerPort: 8081
        {{- if .Values.services.taskGroupController.extraVolumeMounts }}
        volumeMounts:
        {{- include "osmo.extra-volume-mounts" .Values.services.taskGroupController | nindent 8 }}
        {{- end }}
        resources:
        {{- toYaml .Values.services.taskGroupController.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            port: health
            path: /healthz
          failureThreshold: 3
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            port: health
            path: /readyz
          failureThreshold: 3
          periodSeconds: 10
          timeoutSeconds: 5
      {{- include "osmo.extra-sidecars" .Values.services.taskGroupController | nindent 6 }}
      {{- if .Values.services.taskGroupController.extraVolumes }}
      volumes:
      {{- include "osmo.extra-volumes" .Values.services.taskGroupController | nindent 8 }}
      {{- end }}
{{- end }}
