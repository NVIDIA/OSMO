{{- if .Values.services.taskGroupStatusReceiver.enabled }}
{{- $apiEndpoint := .Values.services.taskGroupStatusReceiver.apiEndpoint | default (printf "http://%s/api/internal/taskgroup/status" .Values.services.service.serviceName) }}
{{- $statusTokenSecretName := required "services.taskGroupStatusReceiver.sharedTokenSecretName is required when taskGroupStatusReceiver is enabled" .Values.services.taskGroupStatusReceiver.sharedTokenSecretName }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.taskGroupStatusReceiver.serviceName }}
  labels:
    app: {{ .Values.services.taskGroupStatusReceiver.serviceName }}
spec:
  replicas: {{ .Values.services.taskGroupStatusReceiver.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.services.taskGroupStatusReceiver.serviceName }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.taskGroupStatusReceiver.serviceName }}
        {{- with .Values.services.taskGroupStatusReceiver.extraPodLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "osmo.extra-annotations" .Values.services.taskGroupStatusReceiver | nindent 8 }}
    spec:
      nodeSelector:
        {{- range $k, $v := .Values.global.nodeSelector }}
        {{ $k }}: {{ $v }}
        {{- end }}
        {{- range $k, $v := .Values.services.taskGroupStatusReceiver.nodeSelector }}
        {{ $k }}: {{ $v }}
        {{- end }}
      tolerations:
      {{ toYaml .Values.services.taskGroupStatusReceiver.tolerations | nindent 8 }}
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      serviceAccountName: {{ include "osmo.service-account-name" (dict "serviceAccountName" .Values.services.taskGroupStatusReceiver.serviceAccountName "Values" .Values) }}
      containers:
      - name: {{ .Values.services.taskGroupStatusReceiver.serviceName }}
        image: {{ .Values.global.osmoImageLocation }}/{{ .Values.services.taskGroupStatusReceiver.imageName }}:{{ .Values.services.taskGroupStatusReceiver.imageTag | default .Values.global.osmoImageTag }}
        imagePullPolicy: {{ .Values.services.taskGroupStatusReceiver.imagePullPolicy }}
        command:
        - taskgroup_status_receiver
        args:
        - --host
        - http://0.0.0.0:{{ .Values.services.taskGroupStatusReceiver.grpcPort }}
        - --api-endpoint
        - {{ $apiEndpoint }}
        - --log-level
        - {{ .Values.global.logs.logLevel }}
        {{- if .Values.services.taskGroupStatusReceiver.enableReflection }}
        - --enable-reflection
        {{- end }}
        {{- range $arg := .Values.services.taskGroupStatusReceiver.extraArgs }}
        - {{ $arg | quote }}
        {{- end }}
        env:
        - name: OSMO_TASKGROUP_STATUS_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $statusTokenSecretName }}
              key: {{ .Values.services.taskGroupStatusReceiver.sharedTokenSecretKey }}
        {{- include "osmo.extra-env" .Values.services.taskGroupStatusReceiver | nindent 8 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1001
        ports:
        - name: grpc
          containerPort: {{ .Values.services.taskGroupStatusReceiver.grpcPort }}
        {{- if .Values.services.taskGroupStatusReceiver.extraVolumeMounts }}
        volumeMounts:
        {{- include "osmo.extra-volume-mounts" .Values.services.taskGroupStatusReceiver | nindent 8 }}
        {{- end }}
        resources:
        {{- toYaml .Values.services.taskGroupStatusReceiver.resources | nindent 10 }}
      {{- include "osmo.extra-sidecars" .Values.services.taskGroupStatusReceiver | nindent 6 }}
      {{- if .Values.services.taskGroupStatusReceiver.extraVolumes }}
      volumes:
      {{- include "osmo.extra-volumes" .Values.services.taskGroupStatusReceiver | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.taskGroupStatusReceiver.serviceName }}
  labels:
    app: {{ .Values.services.taskGroupStatusReceiver.serviceName }}
spec:
  ports:
  - port: {{ .Values.services.taskGroupStatusReceiver.grpcPort }}
    targetPort: grpc
    protocol: TCP
    name: grpc
  selector:
    app: {{ .Values.services.taskGroupStatusReceiver.serviceName }}
{{- if .Values.gateway.networkPolicies.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.services.service.serviceName }}-allow-taskgroup-status-receiver
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.services.service.serviceName }}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: {{ .Values.services.taskGroupStatusReceiver.serviceName }}
    ports:
    - port: 8000
      protocol: TCP
{{- end }}
{{- end }}
