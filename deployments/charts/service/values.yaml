## Global configuration values shared across all Osmo services
##
global:
  ## Base location for Osmo Docker images in the registry
  ##
  osmoImageLocation: nvcr.io/nvidia/osmo

  ## Docker image tag for Osmo services
  ##
  osmoImageTag: latest

  ## Name of the Kubernetes secret containing Docker registry credentials
  ##
  imagePullSecret: null

  ## Node selector constraints for pod scheduling
  ##
  nodeSelector: {}
    # Add node selectors here as needed
    # kubernetes.io/arch: amd64
    # node-type: cpu
    # zone: us-west-2a

  ## Service account name for the OSMO services
  ##
  serviceAccountName: osmo

  ## External DNS hostname this OSMO deployment serves on
  ## (e.g. "staging.osmo.nvidia.com").
  ##
  ## Used as the canonical fallback for:
  ##   - services.service.hostname  (API service `--service_hostname`)
  ##   - services.router.hostname   (router `--hostname` for session-key extraction)
  ##   - gateway.envoy.hostname     (Ingress host rule + OAuth2 redirect URL)
  ##
  ## Each per-component hostname above takes precedence when explicitly set;
  ## leaving them empty falls back to this global value.
  ##
  hostname: ""

  ## Logging configuration for all Osmo services
  ##
  logs:
    ## Enable centralized logging collection and log volume mounting
    ##
    enabled: true

    ## Application log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
    ##
    logLevel: DEBUG

    ## Kubernetes system log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
    ##
    k8sLogLevel: WARNING

    ## Log output format for OSMO services that use utils/logging
    ## (Go src/utils/logging and Python src/lib/utils/logging).
    ## - "text" (default): legacy ServiceFormatter format used historically by
    ##   OSMO services (one human-readable line per record).
    ## - "json": one JSON object per record, suitable for direct ingestion by
    ##   Loki/Elastic without a parser stage.
    ## Consumed by: authz_sidecar (Go) and the Python services that wire
    ## --log_format from this value (api, worker, agent, logger,
    ## delayed-job-monitor, router).
    ##
    logFormat: text

## Service account configuration for core Osmo services
##
serviceAccount:
  ## Create the chart-managed ServiceAccount. Set to false to re-use
  ## an existing ServiceAccount that already has workload identity bindings.
  ##
  create: true

  ## ServiceAccount name override. When empty, uses global.serviceAccountName.
  ##
  name: ""

  ## Extra ServiceAccount annotations such as
  ## `azure.workload.identity/client-id` for AKS workload identity.
  ##
  annotations: {}

## Configuration for individual Osmo services
##
services:
  ## Configuration file service settings
  ##
  configFile:
    ## Enable external configuration file loading
    ##
    enabled: false

    ## Path to the configuration file (used when enabled is true)
    ##
    path: /opt/osmo/config.yaml

  ## UI service configuration
  ##
  ui:
    ## Enable the UI workload in the merged service chart
    ##
    enabled: true

    ## Number of UI service replicas to run
    ##
    replicas: 1

    ## Docker image name for the UI service (without registry or tag)
    ##
    imageName: web-ui

    ## Optional UI image tag override
    ## Leave empty to use global.osmoImageTag
    ##
    imageTag: ""

    ## Kubernetes image pull policy for the UI service
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for the UI service
    ##
    serviceName: osmo-ui

    ## Internal hostname used by the Next.js server for API requests
    ##
    apiHostname: osmo-gateway:80

    ## Enable port-forwarding through the UI
    ##
    portForwardEnabled: false

    ## Enable TLS for Next.js API requests
    ##
    nextjsSslEnabled: false

    ## Container port for the UI service
    ##
    containerPort: 8000

    ## Service account name for the UI pods
    ##
    serviceAccountName: osmo

    ## Maximum HTTP header size in KB for the Node.js server
    ##
    maxHttpHeaderSizeKb: 128

    ## Optional command override
    ##
    command: []

    ## Optional args override
    ##
    args: []

    ## Additional pod labels
    ##
    podLabels: {}

    ## UI documentation base URL
    ##
    docsBaseUrl: https://nvidia.github.io/OSMO/main/user_guide/

    ## CLI install script URL shown by the UI
    ##
    cliInstallScriptUrl: https://raw.githubusercontent.com/NVIDIA/OSMO/refs/heads/main/install.sh

    ## Horizontal Pod Autoscaler (HPA) configuration
    ##
    scaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      hpaTarget: 85
      customMetrics: []

    ## Kubernetes service configuration
    ##
    service:
      type: ""
      port: 80
      portName: http
      protocol: TCP
      labels: {}
      annotations: {}
      extraPorts: []
      selector: {}

    ## Node selector constraints for UI pod scheduling
    ##
    nodeSelector: {}

    ## Topology spread constraints to distribute pods across nodes and zones
    ##
    topologySpreadConstraints:
    - topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
    - topologyKey: topology.kubernetes.io/zone
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway

    ## Host aliases for the UI pods
    ##
    hostAliases: []

    ## Tolerations for the UI pods
    ##
    tolerations: []

    ## Resource requests and limits for the UI container
    ##
    resources: {}

    ## Additional container ports
    ##
    extraPorts: []

    ## Additional environment variables for the UI container
    ##
    extraEnvs: []

    ## Environment variable sources from ConfigMaps or Secrets
    ##
    envFrom: []

    ## Additional volume mounts for the UI container
    ##
    extraVolumeMounts: []

    ## Additional volumes for the UI pod
    ##
    extraVolumes: []

    ## Additional annotations for the UI pod
    ##
    extraPodAnnotations: {}

    ## Additional sidecar or helper containers for the UI pod
    ##
    extraContainers: []

    ## Optional init containers for the UI pod
    ##
    initContainers: []

    ## Liveness probe configuration
    ##
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      failureThreshold: 2
      periodSeconds: 5
      timeoutSeconds: 3

    ## Startup probe configuration
    ##
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      failureThreshold: 24
      periodSeconds: 5
      timeoutSeconds: 3
      initialDelaySeconds: 5

    ## Readiness probe configuration
    ##
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      failureThreshold: 2
      timeoutSeconds: 3
      periodSeconds: 5

  ## Database migration configuration (pgroll)
  ## When enabled, a Helm pre-upgrade hook Job runs migrations before pods are updated.
  ## Uses postgres:15-alpine with pgroll downloaded at runtime.
  ##
  migration:
    ## Enable the migration Job
    ##
    enabled: false

    ## Target pgroll schema version. Named after the app version: public_v{MAJOR}_{MINOR}_{PATCH}
    ##
    targetSchema: public

    ## Public image with bash, psql, and curl
    ##
    image: postgres:15-alpine

    ## pgroll release version to download
    ##
    pgrollVersion: v0.16.1

    ## Service account name (defaults to global if empty)
    ##
    serviceAccountName: ""

    ## Node selector, tolerations, and resources for the migration Job pod
    ##
    nodeSelector: {}
    tolerations: []
    resources: {}

    ## Annotations on the Job and ConfigMap resources.
    ## Use this to configure Helm hooks, ArgoCD hooks, or other orchestration.
    ## Example for ArgoCD PreSync:
    ##   extraAnnotations:
    ##     argocd.argoproj.io/hook: PreSync
    ##     argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    ##
    extraAnnotations: {}

    ## Extra configuration for extensibility
    ##
    extraPodAnnotations: {}
    extraEnv: []
    extraVolumeMounts: []
    extraVolumes: []
    initContainers: []

  ## PostgreSQL database service configuration
  ## Set enabled to false if using an external PostgreSQL deployment
  ##
  postgres:
    ## Enable PostgreSQL deployment on Kubernetes
    ## Set to false if using external PostgreSQL or managed service
    ##
    enabled: false

    ## PostgreSQL Docker image to use
    ##
    image: "postgres:15.1"

    ## Kubernetes image pull policy for PostgreSQL
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for PostgreSQL
    ##
    serviceName: postgres

    ## PostgreSQL service port
    ##
    port: 5432

    ## Database name to create and use
    ##
    db: osmo

    ## Enable NodePort service for external access
    ##
    enableNodePort: true

    ## NodePort number for external access (when enableNodePort is true)
    ##
    nodePort: 30033

    ## Persistent volume size for PostgreSQL data
    ##
    storageSize: 20Gi

    ## Storage class name for persistent volume
    ## Leave empty to use default storage class
    ##
    storageClassName: ""

    ## Node selector constraints for PostgreSQL pod scheduling
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: database

    ## Tolerations for PostgreSQL pod scheduling on tainted nodes
    ##
    tolerations: []
    # - key: "dedicated"
    #   operator: "Equal"
    #   value: "database"
    #   effect: "NoSchedule"

    ## PostgreSQL username
    ##
    user: postgres

    ## PostgreSQL password secret configuration
    ## Name of the Kubernetes secret containing the PostgreSQL password
    ##
    passwordSecretName: db-secret

    ## Key name in the secret that contains the PostgreSQL password
    ##
    passwordSecretKey: db-password

  ## Default admin user configuration
  ## When configured, the service will create an admin user on startup with the osmo-admin role
  ## and an access_token set to the specified password
  ##
  defaultAdmin:
    ## Enable default admin user creation
    ## When enabled, username and password must be configured
    ##
    enabled: false

    ## Username for the default admin user
    ##
    username: "admin"

    ## Name of the Kubernetes secret containing the default admin password
    ##
    passwordSecretName: default-admin-secret

    ## Key name in the secret that contains the default admin password
    ##
    passwordSecretKey: password

  ## Dynamic configuration loaded from ConfigMap.
  ## When enabled, all configs are served from in-memory (parsed from the mounted
  ## ConfigMap file). CLI/API writes return 409. The authz_sidecar reads roles
  ## from the same file instead of PostgreSQL. Changes are detected via watchdog/inotify.
  ##
  configs:
    ## Enable ConfigMap-based configuration.
    ## When true: all configs served from in-memory (parsed from ConfigMap),
    ## CLI/API writes return 409, authz_sidecar reads roles from file.
    ## A malformed ConfigMap at startup causes the pod to crash-loop so
    ## the rolling update stalls at the bad revision; old pods keep serving.
    ## When false: configs in database, CLI/API works normally.
    ##
    enabled: false

    ## Service config. service_base_url is auto-derived from
    ## services.service.hostname if not set here.
    ##
    service: {}

    ## Workflow config (limits, timeouts, image credentials).
    ## Use secretName in config fields to reference K8s Secrets.
    ## Each secretName must also be listed in secretRefs above.
    ##
    workflow:
      max_num_tasks: 100
      max_exec_timeout: "30d"
      default_exec_timeout: "7d"

    ## Dataset config (buckets, credentials).
    ## Use credentialSecretName to reference K8s Secrets for bucket creds.
    ##
    dataset: {}

    ## Pod templates applied to workflow containers.
    ##
    podTemplates:
      default_ctrl:
        spec:
          containers:
          - name: osmo-ctrl
            resources:
              limits:
                cpu: "{{USER_CPU}}"
                memory: "{{USER_MEMORY}}"
                ephemeral-storage: "{{USER_STORAGE}}"
              requests:
                cpu: "1"
                memory: "1Gi"
                ephemeral-storage: "1Gi"
      default_user:
        spec:
          containers:
          - name: "{{USER_CONTAINER_NAME}}"
            resources:
              limits:
                cpu: "{{USER_CPU}}"
                memory: "{{USER_MEMORY}}"
                nvidia.com/gpu: "{{USER_GPU}}"
                ephemeral-storage: "{{USER_STORAGE}}"
              requests:
                cpu: "{{USER_CPU}}"
                memory: "{{USER_MEMORY}}"
                nvidia.com/gpu: "{{USER_GPU}}"
                ephemeral-storage: "{{USER_STORAGE}}"

    ## Resource validation rules.
    ##
    resourceValidations:
      default_cpu:
      - operator: LE
        left_operand: "{{USER_CPU}}"
        right_operand: "{{K8_CPU}}"
        assert_message: "Value {{USER_CPU}} too high for CPU"
      - operator: GT
        left_operand: "{{USER_CPU}}"
        right_operand: "0"
        assert_message: "Value {{USER_CPU}} needs to be greater than 0 for CPU"
      default_memory:
      - operator: LE
        left_operand: "{{USER_MEMORY}}"
        right_operand: "{{K8_MEMORY}}"
        assert_message: "Value {{USER_MEMORY}} too high for memory"
      - operator: GT
        left_operand: "{{USER_MEMORY}}"
        right_operand: "0"
        assert_message: "Value {{USER_MEMORY}} needs to be greater than 0 for memory"
      default_storage:
      - operator: LT
        left_operand: "{{USER_STORAGE}}"
        right_operand: "{{K8_STORAGE}}"
        assert_message: "Value {{USER_STORAGE}} too high for storage"
      - operator: GT
        left_operand: "{{USER_STORAGE}}"
        right_operand: "0"
        assert_message: "Value {{USER_STORAGE}} needs to be greater than 0 for storage"

    ## RBAC role definitions. Policies are product defaults.
    ## Override external_roles per deployment to map IDP groups.
    ##
    roles:
      osmo-admin:
        description: "Admin role — full access to all resources"
        policies:
        - effect: Allow
          actions: ["*:*"]
          resources: ["*"]
        external_roles: [osmo-admin]
      osmo-user:
        description: "User role — standard workflow and data operations"
        policies:
        - effect: Allow
          actions:
          - "app:*"
          - "auth:Token"
          - "credentials:*"
          - "dataset:*"
          - "pool:List"
          - "profile:Read"
          - "profile:Update"
          - "resources:Read"
          - "user:List"
          - "workflow:Cancel"
          - "workflow:Create"
          - "workflow:Delete"
          - "workflow:Exec"
          - "workflow:List"
          - "workflow:PortForward"
          - "workflow:Read"
          - "workflow:Rsync"
          - "workflow:Update"
          resources: ["*"]
        external_roles: [osmo-user]
      osmo-default:
        description: "Default role — login, profile, health check"
        policies:
        - effect: Allow
          actions:
          - "auth:Login"
          - "auth:Refresh"
          - "auth:Token"
          - "profile:*"
          - "system:Health"
          resources: ["*"]
        external_roles: []
      osmo-ctrl:
        description: "Controller role — internal container communication"
        policies:
        - effect: Allow
          actions: ["internal:Logger", "internal:Router"]
          resources: ["*"]
        external_roles: [osmo-ctrl]
      osmo-backend:
        description: "Backend role — internal operator communication"
        policies:
        - effect: Allow
          actions: ["internal:Operator", "config:Read", "pool:List"]
          resources: ["*"]
        external_roles: [osmo-backend]

    ## Backend cluster definitions. The "default" backend is created by
    ## configure_app() on first deploy — include it here so ConfigMap mode
    ## serves it from memory.
    ##
    backends:
      default:
        description: "Default backend"
        scheduler_settings:
          scheduler_type: kai
          scheduler_name: kai-scheduler
          scheduler_timeout: 30

    ## Pool definitions. The "default" pool references the "default" backend.
    ##
    pools:
      default:
        description: "Default pool"
        backend: default
        default_platform: default
        common_pod_template:
          - default_ctrl
          - default_user
        common_resource_validations:
          - default_cpu
          - default_memory
          - default_storage
          - default_gpu
        common_default_variables:
          USER_CPU: 1
          USER_GPU: 0
          USER_MEMORY: "1Gi"
          USER_STORAGE: "1Gi"
        platforms:
          default: {}

    ## Backend test definitions.
    ##
    backendTests: {}

    ## Group templates.
    ##
    groupTemplates: {}

    ## K8s Secrets to mount into the service pods.
    ## Each entry generates a volume + volumeMount at /etc/osmo/secrets/<secretName>/.
    ## The Python config loader resolves secretName references in configs at runtime.
    ##
    ## Example:
    ##   secretRefs:
    ##   - secretName: my-bucket-cred        # mounts all keys
    ##   - secretName: imagepullsecret       # mounts all keys
    ##
    secretRefs: []

  ## Redis cache service configuration
  ## Set enabled to false if using an external Redis deployment
  ##
  redis:
    ## Enable Redis deployment on Kubernetes
    ## Set to false if using external Redis or managed service
    ##
    enabled: false

    ## Redis Docker image to use
    ##
    image: "redis:7.0"

    ## Kubernetes image pull policy for Redis
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for Redis
    ##
    serviceName: redis

    ## Redis service port
    ##
    port: 6379

    ## Redis database number to use (0-15)
    ##
    dbNumber: 0

    ## Enable NodePort service for external access
    ##
    enableNodePort: true

    ## NodePort number for external access (when enableNodePort is true)
    ##
    nodePort: 30034

    ## Persistent volume size for Redis data
    ##
    storageSize: 20Gi

    ## Storage class name for persistent volume
    ## Leave empty to use default storage class
    ##
    storageClassName: ""

    ## Node selector constraints for Redis pod scheduling
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: cache

    ## Tolerations for Redis pod scheduling on tainted nodes
    ##
    tolerations: []
    # - key: "dedicated"
    #   operator: "Equal"
    #   value: "cache"
    #   effect: "NoSchedule"

    ## Enable TLS encryption for Redis connections
    ##
    tlsEnabled: true

  ## Localstack S3 Object storage service configuration (local development + testing only)
  ## Set enabled to false if using an external Object storage deployment
  ##
  localstackS3:
    ## Enable Localstack S3 Object storage deployment on Kubernetes
    ## Set to false if using external Localstack S3 Object storage or managed service
    ##
    enabled: false

    ## Localstack S3 Object storage Docker image to use
    ##
    image: "gresau/localstack-persist:latest"

    ## Kubernetes image pull policy for Localstack S3 Object storage
    ##
    imagePullPolicy: Always

    ## Localstack S3 Object storage service name
    ##
    serviceName: localstack-s3

    ## Localstack S3 service port
    ##
    port: 4566

    ## Enable NodePort service for external access
    ##
    enableNodePort: true

    ## NodePort number for external access (when enableNodePort is true)
    ##
    nodePort: 30035

    ## Region for the Localstack S3 Object storage
    ##
    region: us-east-1

    ## Access key for the Localstack S3 Object storage
    ##
    accessKeyId: test

    ## Secret key for the Localstack S3 Object storage
    ##
    accessKey: test

    ## Buckets for the Localstack S3 Object storage
    ##
    buckets: []

    ## Image for the Localstack S3 Object storage bucket initialization
    ##
    bucketInitImage: amazon/aws-cli:2.15.33

    ## Persistent volume configuration for Localstack S3 Object storage
    ##
    persistence:
      enabled: true
      size: 5Gi
      storageClassName: standard

    ## Resource limits and requests for the Localstack S3 Object storage container
    ##
    resources: {}

  ## Delayed job monitor service configuration
  ##
  delayedJobMonitor:
    ## Number of delayed job monitor replicas to run
    ##
    replicas: 1

    ## Docker image name for the delayed job monitor service
    ##
    imageName: delayed-job-monitor

    ## Kubernetes image pull policy for the delayed job monitor service
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for the delayed job monitor service
    ##
    serviceName: osmo-delayed-job-monitor

    ## Init containers for delayed job monitor
    ##
    initContainers: []

    ## Startup probe — runs progress_check until the delayed job monitor
    ## has reported progress at least once. failureThreshold * periodSeconds
    ## (default 24 * 5 = 120s) is how long the kubelet waits before declaring
    ## CrashLoopBackOff.
    ##
    startupProbe:
      exec:
        command:
        - progress_check
        - --progress_interval
        - "30"
      failureThreshold: 24
      periodSeconds: 5
      timeoutSeconds: 15
      initialDelaySeconds: 10

    ## Node selector constraints for delayed job monitor pod scheduling
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: cpu

    ## Volumes for delayed job monitor
    ## Default includes progress files for liveness and startup probes
    ##
    volumes:
      - name: progress-files
        emptyDir: {}

    ## Volume mounts for delayed job monitor
    ## Default includes progress files for liveness and startup probes
    ##
    volumeMounts:
      - name: progress-files
        mountPath: /var/run/osmo

    ## Resource limits and requests for the delayed job monitor container
    ##
    resources: {}
    # limits:
    #   cpu: 200m
    #   memory: 256Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

    ## Tolerations for delayed job monitor pod scheduling on tainted nodes
    ##
    tolerations: []
    # - key: "node-type"
    #   operator: "Equal"
    #   value: "cpu"
    #   effect: "NoSchedule"

    ## Extra pod annotations for the delayed job monitor service
    ##
    extraPodAnnotations: {}

    ## Extra pod labels for the delayed job monitor service pods.
    ## Use for workload identity labels like `azure.workload.identity/use`.
    ##
    extraPodLabels: {}

    ## Extra environment variables for the delayed job monitor service container
    ##
    extraEnv: []

    ## Extra command line arguments for the delayed job monitor service
    ##
    extraArgs: []

    ## Extra volume mounts for the delayed job monitor service container
    ##
    extraVolumeMounts: []

    ## Extra volumes for the delayed job monitor service pod
    ##
    extraVolumes: []

    ## Extra sidecar containers for the delayed job monitor service pod
    ##
    extraSidecars: []

    ## Service account name for the delayed job monitor service
    ##
    serviceAccountName: ""

  ## Worker service configuration for background job processing
  ##
  worker:
    ## Horizontal Pod Autoscaler (HPA) configuration for workers
    ##
    scaling:
      ## Minimum number of worker replicas
      ##
      minReplicas: 2

      ## Maximum number of worker replicas when scaling
      ##
      maxReplicas: 10

      ## Target Memory utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80
      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    ## Docker image name for the worker service
    ##
    imageName: worker

    ## Kubernetes image pull policy for the worker service
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for the worker service
    ##
    serviceName: osmo-worker

    ## Init containers for worker
    ##
    initContainers: []

    ## Startup probe — runs progress_check until the worker has reported
    ## progress at least once. failureThreshold * periodSeconds (default
    ## 24 * 5 = 120s) is how long the kubelet waits before declaring
    ## CrashLoopBackOff.
    ##
    startupProbe:
      exec:
        command:
        - progress_check
        - --progress_interval
        - "300"
      failureThreshold: 24
      periodSeconds: 5
      timeoutSeconds: 15
      initialDelaySeconds: 10

    ## Node selector constraints for worker pod scheduling
    ##
    nodeSelector: {}
    # kubernetes.io/os: linux
    # node-type: cpu


    ## Topology spread constraints to distribute worker pods across nodes/zones
    ##
    topologySpreadConstraints:
    ## Spread worker pods across different hostnames (nodes)
    ##
    - topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
    ## Spread worker pods across different availability zones
    ##
    - topologyKey: topology.kubernetes.io/zone
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway

    ## Resource limits and requests for the worker container
    ##
    resources: {}
    # limits:
    #   cpu: 1000m
    #   memory: 1Gi
    # requests:
    #   cpu: 500m
    #   memory: 512Mi

    ## Tolerations for worker pod scheduling on tainted nodes
    ##
    tolerations: []
    # - key: "node-type"
    #   operator: "Equal"
    #   value: "cpu"
    #   effect: "NoSchedule"

    ## Extra pod annotations for the worker service
    ##
    extraPodAnnotations: {}

    ## Extra pod labels for the worker service pods.
    ## Use for workload identity labels like `azure.workload.identity/use`.
    ##
    extraPodLabels: {}

    ## Extra environment variables for the worker service container
    ##
    extraEnv: []

    ## Additional command line arguments to pass to the worker service
    ##
    extraArgs: []
    # - "--concurrency=10"
    # - "--max-memory=1Gi"

    ## Extra volume mounts for the worker service container
    ##
    extraVolumeMounts: []

    ## Extra volumes for the worker service pod
    ##
    extraVolumes: []

    ## Extra sidecar containers for the worker service pod
    ##
    extraSidecars: []

    ## Service account name for the worker service
    ##
    serviceAccountName: ""

  ## Main API service configuration
  ##
  service:
    ## Horizontal Pod Autoscaler (HPA) configuration for the API service
    ##
    scaling:
      ## Minimum number of API service replicas
      ##
      minReplicas: 3

      ## Maximum number of API service replicas when scaling
      ##
      maxReplicas: 9

      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80
      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    ## Docker image name for the API service
    ##
    imageName: service

    ## Kubernetes image pull policy for the API service
    ##
    imagePullPolicy: Always

    ## Kubernetes service name for the API service
    ##
    serviceName: osmo-service

    ## Init containers for API service
    ##
    initContainers: []

    ## External DNS hostname for the API service (passed as `--service_hostname`).
    ## When empty, falls back to global.hostname.
    ##
    hostname: ""

    ## Host aliases for custom DNS resolution within the API service pods
    ##
    hostAliases: []
    # - ip: "192.168.1.100"
    #   hostnames:
    #   - "example.local"

    ## URL for the client install script shown in version update messages
    ##
    clientInstallUrl: "https://raw.githubusercontent.com/NVIDIA/OSMO/refs/heads/main/install.sh"

    ## Disable task metrics collection (set to true to disable)
    ##
    disableTaskMetrics: false

    ## Enable authentication for the API service
    ## An example when using Keycloak is:
    ##
    ## auth:
    ##   enabled: true
    ##   device_endpoint: https://auth-name.osmo.nvidia.com/realms/osmo/protocol/openid-connect/auth
    ##   device_client_id: osmo-device
    ##   browser_endpoint: https://auth-name.osmo.nvidia.com/realms/osmo/protocol/openid-connect/auth
    ##   browser_client_id: osmo-browser-flow
    ##   token_endpoint: https://auth-name.osmo.nvidia.com/realms/osmo/protocol/openid-connect/token
    ##   logout_endpoint: https://auth-name.osmo.nvidia.com/realms/osmo/protocol/openid-connect/logout
    ##
    ## An example when using Microsoft Azure AD is:
    ##
    ## auth:
    ##   enabled: true
    ##   device_endpoint: https://login.microsoftonline.com/<id>/oauth2/v2.0/devicecode
    ##   device_client_id: <client-id>
    ##   browser_endpoint: https://login.microsoftonline.com/<id>/oauth2/v2.0/authorize
    ##   browser_client_id: <client-id>
    ##   token_endpoint: https://login.microsoftonline.com/<id>/oauth2/v2.0/token
    ##   logout_endpoint: https://login.microsoftonline.com/<id>/oauth2/v2.0/logout
    ##
    auth:
      enabled: false

      ## URL for the device endpoint
      ##
      device_endpoint: ""

      ## Client ID for the device endpoint
      ##
      device_client_id: ""

      ## URL for the browser endpoint
      ##
      browser_endpoint: ""

      ## Client ID for the browser endpoint
      ##
      browser_client_id: ""

      ## URL for the token endpoint
      ##
      token_endpoint: ""

      ## URL for the logout endpoint
      ##
      logout_endpoint: ""

    ## Liveness probe configuration for the API service
    ##
    livenessProbe:
      ## HTTP GET probe configuration
      ##
      httpGet:
        port: 8000
        path: /api/version
      ## Timeout for the probe
      ##
      timeoutSeconds: 20
      ## Number of failures before marking as unhealthy
      ##
      failureThreshold: 3
      ## How often to perform the probe
      ##
      periodSeconds: 45

    ## Startup probe — kubelet waits up to failureThreshold * periodSeconds
    ## (default 24 * 5 = 120s) for the API service to bind its TLS listener
    ## after configmap/secret loads + task-metric registration. Once the
    ## first probe succeeds, the startup phase ends and liveness takes over.
    ##
    startupProbe:
      httpGet:
