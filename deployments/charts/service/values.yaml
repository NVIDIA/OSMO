  enabled: false

## Global configuration for extra ConfigMaps
## These ConfigMaps can be used for custom configurations
##
extraConfigMaps: []
# - name: custom-config
#   data:
#     config.yaml: |
#       key: value

## ============================================================================
## Gateway — standalone Envoy + OAuth2 Proxy + Authz as separate Deployments.
##
## When gateway.enabled is true, the chart deploys an independent Envoy proxy
## tier that routes traffic to all upstream services (osmo-service, osmo-router,
## osmo-ui). Authentication (OAuth2), authorization (Authz), and rate limiting
## are handled at the gateway level rather than per-service.
##
## Envoy uses filesystem-based dynamic configuration (LDS/CDS) so that
## listener and cluster changes are picked up automatically when the ConfigMap
## is updated — no pod restart required.
## ============================================================================
gateway:
  ## Name prefix for all gateway K8s resources (e.g. osmo-gateway-envoy)
  ##
  name: osmo-gateway

  ## -----------------------------------------------------------------------
  ## Gateway Envoy Proxy
  ## -----------------------------------------------------------------------
  envoy:
    ## Enable Envoy deployment
    ##
    enabled: true

    ## Horizontal Pod Autoscaler (HPA) configuration for Envoy
    ##
    scaling:
      ## Minimum number of Envoy replicas
      ##
      minReplicas: 2

      ## Maximum number of Envoy replicas when scaling
      ##
      maxReplicas: 6

      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Target memory utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    ## Envoy container image
    ##
    image: "envoyproxy/envoy:v1.29.0"

    ## Image pull policy for Envoy containers
    ##
    imagePullPolicy: IfNotPresent

    ## Envoy log level
    ##
    logLevel: info

    ## Listener port for incoming traffic
    ##
    listenerPort: 8080

    ## Maximum size of all HTTP headers in KB
    ##
    maxHeadersSizeKb: 128

    ## List of IP addresses to block at the gateway
    ##
    blockedIPs: []

    ## External hostname (used for the Ingress `host:` rule, TLS hosts list, and
    ## OAuth2 redirect URL). When empty, falls back to global.hostname.
    ##
    hostname: ""

    ## Service account name for the Envoy pods
    ##
    serviceAccountName: ""

    ## Default identity headers for unauthenticated requests.
    ##
    ## In minimal / demo deployments where oauth2Proxy and authz are both
    ## disabled, no upstream sets the x-osmo-{user,roles,allowed-pools}
    ## headers — the API treats every UI request as anonymous and returns
    ## empty role/pool lists, so the UI shows blank pages.
    ##
    ## Setting these renders Envoy `request_headers_to_add` rules at the
    ## gateway virtual host with `append_action: ADD_IF_ABSENT`. The chart
    ## also conditionally drops these headers from the gateway's
    ## `internal_only_headers` and Lua strip filter when oauth2Proxy and
    ## authz are both disabled, so client-supplied identity (e.g. dev-mode
    ## CLI's `x-osmo-user: <name>`) flows through; the default is only
    ## injected when the client didn't set its own.
    ##
    ## SECURITY: in this mode the gateway TRUSTS the client's identity
    ## headers. Any caller with network access can claim any user, any
    ## role, and any pool. Only enable on clusters whose gateway is not
    ## reachable from untrusted networks.
    ##
    ## In production (oauth2Proxy or authz enabled), client identity
    ## headers are stripped at both the HCM and Lua-filter layers, so
    ## defaultIdentity is irrelevant — authz/JWT is the canonical source.
    ## Leave all three empty in that mode.
    ##
    defaultIdentity:
      user: ""           # e.g. "admin"
      roles: ""          # comma-separated, e.g. "osmo-admin"
      allowedPools: ""   # comma-separated, e.g. "default"

    ## Kubernetes Service configuration for the gateway.
    ##
    ## Two modes for external access:
    ##   NLB (default): type=LoadBalancer — each deployment gets its own NLB
    ##   ALB (shared):  type=ClusterIP + ingress.enabled=true — multiple
    ##                  namespaces share a single ALB via group.name
    ##
    service:
      ## Service type:
      ##   LoadBalancer — direct NLB access (default, one LB per deployment)
      ##   ClusterIP    — use with gateway.envoy.ingress for shared ALB
      ##   NodePort     — use with KIND port mapping for local development
      ##
      type: LoadBalancer

      ## HTTPS port for NLB TLS termination.
      ## The NLB terminates TLS on this port and forwards plaintext to Envoy.
      ## Set to null to expose only port 80 (e.g. for local development).
      ##
      httpsPort: 443

      ## Fixed NodePort for the HTTP port (only used when type=NodePort).
      ## KIND maps this to a host port for local access.
      ##
      nodePort: null

      ## Annotations for the Service (e.g. AWS NLB annotations)
      ##
      annotations: {}

    ## Ingress configuration for shared ALB mode.
    ## Enable this and set service.type=ClusterIP when multiple namespaces
    ## need to share a single load balancer (e.g. ALB with group.name).
    ##
    ingress:
      ## Enable ALB Ingress (set service.type to ClusterIP when using this)
      ##
      enabled: false

      ## Ingress controller class
      ##
      ingressClass: alb

      ## AWS ALB-specific annotations
      ##
      albAnnotations:
        enabled: false
        groupName: osmo
        groupOrder: "10"
        sslCertArn: ""

      ## Enable TLS on the Ingress
      ##
      sslEnabled: false

      ## Secret name for TLS certificates
      ##
      sslSecret: osmo-tls

      ## Additional annotations
      ##
      annotations: {}

    ## SSL/TLS configuration for the Envoy listener (downstream).
    ## The Secret must contain tls.crt and tls.key entries (kubernetes.io/tls type).
    ## Mounted as a directory (not subPath) so Kubernetes symlink rotation
    ## propagates cert renewals without a pod restart.
    ##
    ssl:
      enabled: false
      secretName: envoy-ssl-cert

    ## Security context for Envoy containers
    ##
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1001

    ## Resource limits and requests for Envoy containers
    ##
    resources:
      requests:
        cpu: "200m"
        memory: "128Mi"
      limits:
        memory: "256Mi"

    ## Health probes for Envoy containers
    ##
    livenessProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
    readinessProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
    startupProbe:
      httpGet:
        path: /ready
        port: 9901
      initialDelaySeconds: 15
      periodSeconds: 5
      timeoutSeconds: 3

    ## Node selector for Envoy pods
    ##
    nodeSelector: {}

    ## Tolerations for Envoy pods
    ##
    tolerations: []

    ## Identity Provider for JWKS discovery (e.g. login.microsoftonline.com)
    ##
    idp:
      host: ""

    ## Internal JWKS cluster — used for the "osmo" JWT issuer.
    ## Points to the osmo-service K8s Service so Envoy can fetch the JWKS.
    ##
    internalJwks:
      enabled: true
      cluster: osmo-service-jwks
      host: ""
      port: ""

    ## JWT authentication configuration
    ##
    jwt:
      user_header: x-osmo-user
      providers: []

    ## Paths that bypass authentication (served without OAuth2 or JWT checks)
    ##
    skipAuthPaths:
    - /api/version
    - /api/auth/login
    - /api/auth/keys
    - /api/auth/refresh_token
    - /api/auth/jwt/refresh_token
    - /api/auth/jwt/access_token
    - /api/router/version
    - /client/version

    ## Route configuration for the osmo-router upstream.
    ## Uses RING_HASH lb_policy with a cookie for session affinity.
    ##
    routerRoute:
      prefix: /api/router
      timeout: 0s
      cookie:
        name: _osmo_router_affinity
        ttl: 60s

    ## Advanced service routes for the osmo-service upstream.
    ## Each entry is a standard Envoy route YAML block (match + route).
    ## When empty, default routes for /api/ and /client/ are used.
    ##
    serviceRoutes: []

    ## Circuit breaker — max concurrent requests to the osmo-service upstream
    ##
    maxRequests: 100

  ## -----------------------------------------------------------------------
  ## Upstream services — K8s Service DNS names that the gateway routes to.
  ## Override with FQDN (e.g. osmo-service.ns.svc.cluster.local) when the
  ## gateway is in a different namespace than the upstream services.
  ## -----------------------------------------------------------------------
  upstreams:
    service:
      enabled: true
      host: osmo-service
      port: 80
    router:
      enabled: true
      host: osmo-router-headless
      ## Port 8000 (not 80) because the headless service resolves to pod IPs
      ## directly, and Envoy connects to the pod port, not the Service port.
      port: 8000
    ui:
      enabled: true
      host: osmo-ui
      port: 80
    agent:
      enabled: true
      host: osmo-agent
      port: 80
    logger:
      enabled: true
      host: osmo-logger
      port: 80

  ## -----------------------------------------------------------------------
  ## Gateway OAuth2 Proxy — handles OIDC authentication flows.
  ## Deployed as its own pod so it can be scaled and updated independently.
  ## -----------------------------------------------------------------------
  oauth2Proxy:
    enabled: true

    ## Horizontal Pod Autoscaler (HPA) configuration for OAuth2 Proxy
    ##
    scaling:
      ## Minimum number of OAuth2 Proxy replicas
      ##
      minReplicas: 1

      ## Maximum number of OAuth2 Proxy replicas when scaling
      ##
      maxReplicas: 3

      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Target memory utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    image: "quay.io/oauth2-proxy/oauth2-proxy:v7.14.2"
    imagePullPolicy: IfNotPresent
    httpPort: 4180
    metricsPort: 44180
    provider: oidc
    oidcIssuerUrl: ""
    clientId: ""
    cookieName: _osmo_session
    cookieSecure: true
    cookieDomain: ""
    cookieExpire: 168h
    cookieRefresh: 1h
    scope: "openid email profile"
    passAccessToken: false
    redisSessionStore: true
    useKubernetesSecrets: false
    secretName: oauth2-proxy-secrets
    clientSecretKey: client_secret
    cookieSecretKey: cookie_secret
    secretPaths:
      clientSecret: /etc/oauth2-proxy/client-secret
      cookieSecret: /etc/oauth2-proxy/cookie-secret
    extraArgs: []
    ## Extra environment variables for the oauth2-proxy container. Useful for
    ## passing credentials from Secrets — e.g. Redis password via
    ## OAUTH2_PROXY_REDIS_PASSWORD when redisSessionStore is enabled.
    extraEnv: []
    redis:
      serviceName: ""
      port: 6379
      tlsEnabled: true
      dbNumber: 0
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1001
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        memory: "128Mi"
    nodeSelector: {}
    tolerations: []
    extraPodAnnotations: {}
    extraVolumeMounts: []
    extraVolumes: []
    serviceAccountName: ""

  ## -----------------------------------------------------------------------
  ## Gateway Authz — gRPC authorization service evaluating semantic RBAC
  ## policies against PostgreSQL. Uses the shared services.postgres config.
  ## -----------------------------------------------------------------------
  authz:
    enabled: true

    ## Horizontal Pod Autoscaler (HPA) configuration for Authz
    ##
    scaling:
      ## Minimum number of Authz replicas
      ##
      minReplicas: 1

      ## Maximum number of Authz replicas when scaling
      ##
      maxReplicas: 3

      ## Target CPU utilization percentage for HPA scaling
      ##
      hpaCpuTarget: 80

      ## Target memory utilization percentage for HPA scaling
      ##
      hpaMemoryTarget: 80

      ## Additional custom metrics for HPA scaling (list of autoscaling/v2 metric specs)
      ##
      customMetrics: []

    imageName: "authz-sidecar"
    ## Override the image tag for authz. Defaults to global.osmoImageTag.
    imageTag: ""
    imagePullPolicy: Always
    grpcPort: 50052
    extraEnv: []
    postgres:
      sslMode: prefer
      maxConns: 10
      minConns: 2
      maxConnLifetimeMin: 5
    cache:
      ttl: 300
      maxSize: 1000
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 10001
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    livenessProbe:
      grpc:
        port: 50052
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    readinessProbe:
      grpc:
        port: 50052
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 2
    nodeSelector: {}
    tolerations: []
    extraPodAnnotations: {}
    extraVolumeMounts: []
    extraVolumes: []
    serviceAccountName: ""

  ## -----------------------------------------------------------------------
  ## Gateway Rate Limiting — Redis-backed rate limiting via Envoy's
  ## ratelimit filter. Deploys a standalone ratelimit service pod.
  ## -----------------------------------------------------------------------
  rateLimit:
    enabled: false
    replicas: 1
    image: envoyproxy/ratelimit:9d8d70a8
    imagePullPolicy: IfNotPresent
    grpcPort: 8091
    httpPort: 8090

    redis:
      serviceName: ""
      port: 6379
      tlsEnabled: true

    config:
      domain: ratelimit
      descriptors: []

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1001
    resources:
      requests:
        cpu: "0.1"
        memory: "200Mi"
      limits:
        memory: "200Mi"
    nodeSelector: {}
    tolerations: []

  ## Restrict upstream pod ingress to the gateway Envoy. Requires a CNI
  ## that enforces NetworkPolicy (Calico, Cilium, AWS VPC CNI with
  ## enable-network-policy-controller=true).
  networkPolicies:
    enabled: false
    upstreams:
    - name: osmo-service
      podSelector:
        app: osmo-service
      port: 8000
    - name: osmo-router
      podSelector:
        app: osmo-router
      port: 8000
    - name: osmo-ui
      podSelector:
        app: osmo-ui
      port: 8000

  ## TLS for gateway -> upstream traffic. Default: each service mints an
  ## ephemeral self-signed cert in-process; Envoy connects with TLS but does
  ## not validate (encryption-only — identity is provided by NetworkPolicy /
  ## RBAC). UI is excluded; stays HTTP.
  ##
  ## To use externally-provisioned certs, set upstreamCerts.<service> to the
  ## name of an existing kubernetes.io/tls Secret containing tls.crt + tls.key.
  ## To make Envoy validate against a CA, set caSecret to an existing Secret
  ## containing ca.crt. How those Secrets get created (cert-manager, Vault
  ## CSI, sealed-secrets, manual, etc.) is up to the operator — OSMO just
  ## consumes them.
  tls:
    enabled: true

    ## Per-upstream server certs. Empty string = mint ephemeral self-signed
    ## in-process. Otherwise the named Secret is mounted at /etc/osmo/tls
    ## and uvicorn loads tls.crt + tls.key from it.
    upstreamCerts:
      service: ""
      router: ""
      agent: ""
      logger: ""

    ## Optional CA bundle for Envoy upstream validation. When set, Envoy
    ## validates upstream certs against ca.crt from this Secret. When empty,
    ## TLS is encryption-only (no validation).
    caSecret: ""
