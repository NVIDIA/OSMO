#
# OSMO minimal-deployment service values.
#
# Modeled on the canonical docs example at:
#   external/docs/deployment_guide/appendix/deploy_minimal.rst
#
# This file is consumed by `deploy-osmo-minimal.sh` via `helm install -f`.
# Values that vary per cluster (PG/Redis hosts, image tag, NGC pull secret
# name, OSMO namespace) are NOT set here — they're injected with `--set` at
# install time. Edit the rest of this file directly to customize a deploy.
#
# WARNING (matches docs): minimal mode disables OAuth2 Proxy + authz at the
# gateway. The gateway then trusts client-supplied identity headers. Do NOT
# expose this gateway to untrusted networks. For production, use the standard
# deploy guide which keeps `gateway.oauth2Proxy.enabled` and
# `gateway.authz.enabled` at their chart defaults (true).

# `global: {}` (not `global:` alone) — a key with only comments parses as null,
# which makes `helm --set global.foo=bar` fail with
# "interface conversion: interface {} is nil, not map[string]interface {}".
# osmoImageLocation / osmoImageTag / imagePullSecret are injected via --set.
global: {}

services:
  configFile:
    enabled: true

  # ────────────────────────────────────────────────────────────────────────
  # ConfigMap-mode (6.3) configs. The chart renders this block into the
  # ConfigMap mounted at /etc/osmo/configs/ that the service reads at boot.
  # In 6.3 the config IS the source of truth — `osmo config update` returns
  # HTTP 409. Edit this file (and re-run helm) to change config.
  #
  # Per-cluster values (image registry/tag, NGC pull secret, OSMO_NAMESPACE)
  # are injected via `--set` by deploy-k8s.sh. `workflow_data.base_url` is
  # the only backend-specific bit and gets layered in from the storage
  # values fragment (configure-storage.sh writes scripts/values/.storage-values.yaml).
  # ────────────────────────────────────────────────────────────────────────
  configs:
    enabled: true

    # services.configs.service.service_base_url is injected via --set by
    # deploy-k8s.sh (gateway DNS name with namespace baked in). No literal
    # default here — the chart auto-derives it from services.service.hostname
    # when unset (charts/service/values.yaml:442) so this stays empty unless
    # --set overrides it.
    #
    # services.configs.backends.default — chart already provides
    # `description` and `scheduler_settings` (kai, 30s timeout) at
    # charts/service/values.yaml:578. deploy-k8s.sh adds `router_address` via
    # --set on top of those chart defaults; no literal block needed here.

    # secretRefs tells the chart which K8s Secrets to mount at
    # /etc/osmo/secrets/<name>/ so the config loader can resolve `secretName`
    # references at boot.
    #
    # service.yaml only owns the NGC pull-secret reference (used by
    # workflow.backend_images.credential below — needed in every auth mode for
    # pulling osmo images). The workflow-data/log/app secret refs are added by
    # the storage fragment in static auth mode; they're absent in
    # workload-identity mode (no secrets to mount; SDK uses the SA's WI token).
    #
    # deploy-k8s.sh's --set global.imagePullSecret tracks NGC_SECRET_NAME to
    # override `nvcr-secret` when the cluster's pull secret has a different name.
    secretRefs:
      - secretName: nvcr-secret

    workflow:
      # backend_images: the init + client (osmo_ctrl) container images that the
      # backend-worker injects into every workflow Pod. The chart has no defaults
      # for `init` / `client` — deploy-k8s.sh always --sets them from
      # OSMO_IMAGE_REGISTRY + OSMO_IMAGE_TAG, so no literals here. The
      # `credential` block IS the real default (.dockerconfigjson is K8s-standard,
      # nvcr-secret is the NGC default secret name; deploy-k8s.sh only --sets
      # secretName when NGC_SECRET_NAME differs from the default).
      backend_images:
        credential:
          secretName: nvcr-secret
          secretKey: .dockerconfigjson

      # workflow_data / workflow_log / workflow_app credential blocks are owned
      # entirely by the storage values fragment (configure-storage.sh writes
      # scripts/values/.storage-values.yaml). Two shapes:
      #
      # - Static auth (default):
      #     workflow_data:
      #       credential:
      #         secretName: osmo-workflow-data-cred   # K8s Secret w/ access_key_id+access_key
      #       base_url: <backend-specific URL>
      #
      # - Workload identity (--auth-method workload-identity):
      #     workflow_data:
      #       credential:
      #         endpoint: <bucket URL>               # DefaultDataCredential — SDK
      #                                              # resolves creds via SA's WI token
      #       base_url: <backend-specific URL>
      #
      # Keeping these out of service.yaml lets the fragment cleanly own the
      # auth-mode-specific shape without needing to "delete" base values.

  postgres:
    # External PostgreSQL — set to true if you want the chart to deploy
    # an in-cluster PG instead of pointing at a managed/external one.
    enabled: false
    # serviceName / port / db / user are injected via --set
    passwordSecretName: db-secret
    passwordSecretKey: db-password

  redis:
    # External Redis — set to true to deploy an in-cluster instance.
    enabled: false
    # serviceName / port injected via --set
    tlsEnabled: true   # set to false if your Redis doesn't require TLS
    passwordSecretName: redis-secret
    passwordSecretKey: redis-password

  service:
    scaling:
      minReplicas: 1
      maxReplicas: 1

  router:
    scaling:
      minReplicas: 1
      maxReplicas: 1

  agent:
    scaling:
      minReplicas: 1
      maxReplicas: 1

  worker:
    scaling:
      minReplicas: 1
      maxReplicas: 1

  logger:
    scaling:
      minReplicas: 1
      maxReplicas: 1

  ui:
    enabled: true
    # apiHostname is injected via --set so the namespace can vary.

  defaultAdmin:
    enabled: true
    username: admin
    passwordSecretName: default-admin-secret
    passwordSecretKey: password

  # PodMonitor objects require prometheus-operator CRDs. Off by default;
  # users with prometheus-operator should layer values/pod-monitor-on.yaml
  # on top of this file (deploy-osmo-minimal.sh does that auto-detection).
  # Top-level podMonitor toggle — see also the chart's per-service overrides.

# Standalone Envoy gateway — auth disabled per the minimal docs reference.
# See the WARNING at the top of this file.
gateway:
  enabled: true
  oauth2Proxy:
    enabled: false
  authz:
    enabled: false
  envoy:
    # With oauth2Proxy + authz both off, no upstream sets the
    # x-osmo-{user,roles,allowed-pools} headers. Inject defaults so the UI
    # shows pages instead of empty role/pool lists for the local admin.
    defaultIdentity:
      user: admin
      roles: osmo-admin
      allowedPools: default

# Top-level PodMonitor — disabled to avoid CRD-not-installed errors on
# clusters without prometheus-operator. Re-enable by passing
# `-f values/pod-monitor-on.yaml` to helm.
podMonitor:
  enabled: false
