apiVersion: v1
kind: ServiceAccount
metadata:
  name: osmo-rust-spike-control
  namespace: osmo-exp
imagePullSecrets:
- name: nvcr-secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: osmo-rust-spike-control
  namespace: osmo-exp
rules:
- apiGroups:
  - spike.osmo.nvidia.com
  resources:
  - osmoworkflows
  - osmotaskgroups
  - osmoclusters
  - osmopools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - spike.osmo.nvidia.com
  resources:
  - osmoworkflows/status
  - osmotaskgroups/status
  - osmoclusters/status
  - osmopools/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - spike.osmo.nvidia.com
  resources:
  - osmoworkflows/finalizers
  verbs:
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: osmo-rust-spike-control
  namespace: osmo-exp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: osmo-rust-spike-control
subjects:
- kind: ServiceAccount
  name: osmo-rust-spike-control
  namespace: osmo-exp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osmo-rust-spike-control
  namespace: osmo-exp
  labels:
    app.kubernetes.io/name: osmo-rust-spike
    app.kubernetes.io/component: control
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: osmo-rust-spike
      app.kubernetes.io/component: control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: osmo-rust-spike
        app.kubernetes.io/component: control
    spec:
      serviceAccountName: osmo-rust-spike-control
      containers:
      - name: spike
        image: nvcr.io/nvstaging/osmo/osmo-rust-spike:phase1-hardened-20260624-0105
        imagePullPolicy: Always
        env:
        - name: RUST_LOG
          value: info
        - name: OSMO_SPIKE_ROLE
          value: control
        - name: CONTROL_NAMESPACE
          value: osmo-exp
        - name: OPERATOR_BIND
          value: 0.0.0.0:50051
        - name: API_BIND
          value: 0.0.0.0:8080
        - name: API_BODY_LIMIT_BYTES
          value: "1048576"
        - name: API_AUTHZ_POLICY_JSON
          valueFrom:
            secretKeyRef:
              name: osmo-rust-spike-cluster-token
              key: api-authz-policy-json
        - name: CLUSTER_TOKEN
          valueFrom:
            secretKeyRef:
              name: osmo-rust-spike-cluster-token
              key: cluster-token
        ports:
        - name: grpc
          containerPort: 50051
        - name: http
          containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: osmo-rust-spike-operator
  namespace: osmo-exp
spec:
  selector:
    app.kubernetes.io/name: osmo-rust-spike
    app.kubernetes.io/component: control
  ports:
  - name: grpc
    port: 50051
    targetPort: grpc
  - name: http
    port: 8080
    targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: osmo-rust-spike-operator
  namespace: osmo-exp
  annotations:
    alb.ingress.kubernetes.io/group.name: osmo2
    alb.ingress.kubernetes.io/group.order: "60"
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:963809516569:certificate/f8f67ccd-bdf6-4660-8d83-ff51bb3dc90a
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/backend-protocol-version: GRPC
    alb.ingress.kubernetes.io/success-codes: "12"
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=3600
spec:
  ingressClassName: alb
  rules:
  - host: osmo-rust-spike.osmo.nvidia.com
    http:
      paths:
      - path: /osmo.spike.v1.ClusterSession
        pathType: Prefix
        backend:
          service:
            name: osmo-rust-spike-operator
            port:
              name: grpc
