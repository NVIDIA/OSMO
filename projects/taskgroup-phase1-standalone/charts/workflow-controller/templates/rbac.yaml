{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "workflow-controller.fullname" . }}
  labels:
    {{- include "workflow-controller.labels" . | nindent 4 }}
rules:
- apiGroups:
  - workflow.osmo.nvidia.com
  resources:
  - workflows
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - workflow.osmo.nvidia.com
  resources:
  - workflows/finalizers
  verbs:
  - update
- apiGroups:
  - workflow.osmo.nvidia.com
  resources:
  - workflows/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - get
  - list
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "workflow-controller.fullname" . }}
  labels:
    {{- include "workflow-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "workflow-controller.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "workflow-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
