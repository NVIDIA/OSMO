apiVersion: workflow.osmo.nvidia.com/v1alpha1
kind: Workflow
metadata:
  name: kai-smoke
  namespace: control
spec:
  clusterID: compute-a
  namespace: osmo-vpan
  mode: active
  runtimeType: kai
  taskGroups:
  - name: smoke
    runtimeConfig:
      kai:
        queue: queue-a
        schedulerName: kai-scheduler
        minMember: 1
        podTemplate:
          labels:
            app: osmo
          containers:
          - name: user
            image: busybox
            command:
            - sleep
            - "60"
