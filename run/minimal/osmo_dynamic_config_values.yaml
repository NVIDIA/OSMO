# Helm values for E2E testing of the dynamic config (ConfigMap loader) feature.
# Use as an overlay on top of the base osmo_values.yaml:
#   helm upgrade --install osmo deployments/charts/service/ \
#     -f run/minimal/osmo_values.yaml \
#     -f run/minimal/osmo_dynamic_config_values.yaml \
#     -n osmo

sidecars:
  oauth2Proxy:
    enabled: false
  authz:
    imagePullPolicy: IfNotPresent

services:
  service:
    imagePullPolicy: IfNotPresent
  worker:
    imagePullPolicy: IfNotPresent
  agent:
    imagePullPolicy: IfNotPresent
  logger:
    imagePullPolicy: IfNotPresent
  delayedJobMonitor:
    imagePullPolicy: IfNotPresent
  dynamicConfig:
    enabled: true

    # Singleton configs
    workflow:
      max_num_tasks: 50
      max_exec_timeout: "60d"

    service:
      service_base_url: "http://ingress-nginx-controller.ingress-nginx.svc.cluster.local"

    # Named configs
    backends:
      e2e-backend:
        description: "E2E test backend"

    pools:
      e2e-test:
        description: "E2E test pool from ConfigMap"
        backend: "e2e-backend"
        platforms:
          default:
            labels:
              node_group: "compute"

    podTemplates:
      e2e-compute:
        spec:
          containers:
            - name: "{{USER_CONTAINER_NAME}}"
              env:
                - name: OSMO_LOGIN_DEV
                  value: "true"
            - name: osmo-ctrl
              env:
                - name: OSMO_LOGIN_DEV
                  value: "true"
          nodeSelector:
            node_group: compute

    resourceValidations:
      e2e-cpu-limit:
        - resource: cpu
          min: "1"
          max: "64"
