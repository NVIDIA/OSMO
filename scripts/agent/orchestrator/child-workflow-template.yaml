# Child workflow template for orchestrator subtasks.
# Placeholders are substituted by submit-child.sh at submission time.

name: agent-child-__MODULE__
description: "__DESCRIPTION__"

tasks:
  - name: child-task
    image: osmo-agent:latest
    command:
      - claude-code
      - "--prompt"
      - |
        __PROMPT_CONTENTS__
    env:
      GITHUB_REPO: "__GITHUB_REPO__"
      BRANCH_NAME: "__BRANCH__"
      COMMIT_PREFIX: "__COMMIT_PREFIX__"
    resources:
      cpu: "2"
      memory: "8Gi"
