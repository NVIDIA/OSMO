services:
  configs:
    podTemplates:
      default-user:
        spec:
          containers:
            - name: "{{USER_CONTAINER_NAME}}"
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  nvidia.com/gpu: "{{USER_GPU}}"
      shared-workspace:
        spec:
          volumes:
            - name: shared-workspace
              persistentVolumeClaim:
                claimName: shared-workspace-pvc
          containers:
            - name: "{{USER_CONTAINER_NAME}}"
              volumeMounts:
                - name: shared-workspace
                  mountPath: /mnt/shared
            - name: osmo-ctrl
              volumeMounts:
                - name: shared-workspace
                  mountPath: /mnt/shared
      h100-node:
        spec:
          nodeSelector:
            nvidia.com/gpu.product: H100
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
    resourceValidations:
      balanced-gpu:
        - operator: GE
          left_operand: "{{USER_GPU}}"
          right_operand: "0"
          assert_message: GPU requests must be non-negative.
        - operator: LE
          left_operand: "{{USER_GPU}}"
          right_operand: "8"
          assert_message: GPU requests are capped at 8 GPUs.
        - operator: NE
          left_operand: "{{USER_GPU}}"
          right_operand: "3"
          assert_message: GPU requests must be 0, 1, 2, 4, or 8 GPUs.
        - operator: NE
          left_operand: "{{USER_GPU}}"
          right_operand: "5"
          assert_message: GPU requests must be 0, 1, 2, 4, or 8 GPUs.
        - operator: NE
          left_operand: "{{USER_GPU}}"
          right_operand: "6"
          assert_message: GPU requests must be 0, 1, 2, 4, or 8 GPUs.
        - operator: NE
          left_operand: "{{USER_GPU}}"
          right_operand: "7"
          assert_message: GPU requests must be 0, 1, 2, 4, or 8 GPUs.
        - operator: GE
          left_operand: "{{USER_CPU}}"
          right_operand: "{{USER_GPU}}"
          assert_message: CPU must be at least the requested GPU count; use environment-specific validation for stricter CPU-to-GPU ratios.
      h100-limit:
        - operator: LE
          left_operand: "{{USER_GPU}}"
          right_operand: "8"
          assert_message: H100 jobs are capped at 8 GPUs.
    groupTemplates:
      base-config:
        manifests:
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: "{{WF_GROUP_UUID}}-base-config"
            data:
              deployment: sample-prod
