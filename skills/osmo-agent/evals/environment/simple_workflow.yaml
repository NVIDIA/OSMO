workflow:
  name: hello-world
  tasks:
  - name: hello
    image: ubuntu:22.04
    command: ["bash"]
    args: ["/tmp/entry.sh"]
    files:
    - contents: |
        #!/bin/bash
        set -e
        echo "Hello from OSMO!"
        echo "Hostname: $(hostname)"
        echo "Date: $(date)"
        mkdir -p {{output}}
        echo "Hello World" > {{output}}/hello.txt
      path: /tmp/entry.sh
    outputs:
    - dataset:
        name: hello-world-output
  resources:
    default:
      cpu: 2
      gpu: 2
      memory: 8Gi
      storage: 10Gi
