workflow:
  name: oversized
  tasks:
  - name: generate
    image: nvcr.io/nvidia/isaac-sim:4.5.0
    command: ["bash"]
    args: ["/tmp/entry.sh"]
    files:
    - contents: |
        #!/bin/bash
        set -e
        echo "Generating synthetic data"
        python -m isaac.sdg --num-images 1000 --out {{output}}/images
      path: /tmp/entry.sh
    outputs:
    - dataset:
        name: oversized-output
  resources:
    default:
      cpu: 300
      gpu: 4
      memory: 2000Gi
      storage: 2000Gi
