workflow:
  name: gr00t-train-1
  tasks:
  - name: train
    image: nvcr.io/nvidia/gr00t:latest
    command: ["bash"]
    args: ["/tmp/entry.sh"]
    environment:
      DATASET_NAME: gr00t-pick-and-place
      EPOCHS: "10"
      BATCH_SIZE: "32"
    files:
    - contents: |
        #!/bin/bash
        set -e
        echo "Starting GR00T fine-tuning"
        python -m gr00t.train \
          --dataset /workflow/inputs/dataset \
          --output {{output}}/model \
          --num-gpus {{num_gpu}}
        echo "Training complete"
      path: /tmp/entry.sh
    inputs:
    - dataset:
        name: gr00t-pick-and-place
    outputs:
    - dataset:
        name: gr00t-train-1-output
  resources:
    default:
      cpu: 32
      gpu: "{{num_gpu}}"
      memory: 256Gi
      storage: 500Gi
