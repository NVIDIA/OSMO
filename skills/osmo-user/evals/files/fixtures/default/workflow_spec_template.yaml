workflow:
  name: gr00t-train-1
  tasks:
  - name: train
    image: nvcr.io/nvidia/gr00t:1.5.0
    command: ["bash"]
    args: ["/tmp/entry.sh"]
    environment:
      INPUT_NAME: gr00t-pick-and-place
      EPOCHS: "10"
      BATCH_SIZE: "32"
    files:
    - contents: |
        #!/bin/bash
        set -e
        echo "Starting GR00T fine-tuning"
        python -m gr00t.train \
          --input-dir {{input:0}} \
          --output {{output}}/model \
          --num-gpus {{num_gpu}}
        echo "Training complete"
      path: /tmp/entry.sh
    inputs:
    - url: s3://my-bucket/gr00t-pick-and-place/
    outputs:
    - url: s3://my-bucket/gr00t-train-1-output/
  resources:
    default:
      cpu: 32
      gpu: "{{num_gpu}}"
      memory: 256Gi
      storage: 500Gi
