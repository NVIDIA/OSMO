syntax = "proto3";

package osmo.operator.v1;

import "src/proto/operator/messages.proto";

option go_package = "go.corp.nvidia.com/osmo/proto/operator;operator";

service OperatorService {
  rpc CreateOTG(CreateOTGRequest) returns (CreateOTGResponse);
  rpc DeleteOTG(DeleteOTGRequest) returns (DeleteOTGResponse);
  rpc GetOTGStatus(GetOTGStatusRequest) returns (GetOTGStatusResponse);
}

service TaskGroupStatusService {
  rpc ReportOTGStatus(ReportOTGStatusRequest) returns (ReportOTGStatusResponse);
}
