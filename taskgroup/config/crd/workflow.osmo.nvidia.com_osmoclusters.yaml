apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: osmoclusters.workflow.osmo.nvidia.com
spec:
  group: workflow.osmo.nvidia.com
  names:
    kind: OSMOCluster
    listKind: OSMOClusterList
    plural: osmoclusters
    singular: osmocluster
    shortNames: [ocl]
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - { name: Region, type: string, jsonPath: .spec.region }
        - { name: Mesh,   type: string, jsonPath: .spec.network.type }
        - { name: Status, type: string, jsonPath: .status.connection }
        - { name: Age,    type: date,   jsonPath: .metadata.creationTimestamp }
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                region:   { type: string }
                provider: { type: string }
                gpuTypes: { type: array, items: { type: string } }
                network:
                  type: object
                  properties:
                    type:   { type: string, enum: [submariner, tailnet, netmaker, ingress, ""] }
                    config:
                      type: object
                      additionalProperties: { type: string }
            status:
              type: object
              properties:
                connection: { type: string, enum: [Connected, Disconnected, Unknown] }
                lastSeen:   { type: string, format: date-time }
                controllerVersion: { type: string }
                supportedRuntimes: { type: array, items: { type: string } }
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:               { type: string }
                      status:             { type: string }
                      reason:             { type: string }
                      message:            { type: string }
                      lastTransitionTime: { type: string, format: date-time }
