#
# Controller deployment: runs both the Workflow Controller and the TaskGroup Controller
# in the same binary (controlled by --enable-workflow-controller and
# --enable-taskgroup-controller flags).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskgroup-controller
  namespace: osmo-system
  labels:
    app.kubernetes.io/name: taskgroup-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taskgroup-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskgroup-controller
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: taskgroup-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: osmo-taskgroup-controller:v0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --taskgroup-namespace=osmo-workflows
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --leader-elect=false
            - --enable-workflow-controller=true
            - --enable-taskgroup-controller=true
          ports:
            - name: metrics
              containerPort: 8080
            - name: probes
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
