#
# A minimal KAI Scheduler PodGroup CRD for development/test clusters that don't have the
# real KAI Scheduler installed.
#
# This is NOT a substitute for installing KAI. With this CRD applied alone, PodGroups will
# be created by the controller but nothing schedules them (KAI's scheduler is what makes
# gang scheduling work). The Pods will still run as long as they are otherwise schedulable
# because the default scheduler may pick them up.
#
# For real gang-scheduling behavior install KAI Scheduler proper:
#   https://github.com/NVIDIA/KAI-scheduler
#
# Apply this CRD only on dev clusters where you don't have KAI:
#   kubectl apply -f deploy/dev/kai-podgroup-crd.yaml

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: podgroups.scheduling.kai.run.ai
spec:
  group: scheduling.kai.run.ai
  names:
    kind: PodGroup
    listKind: PodGroupList
    plural: podgroups
    singular: podgroup
  scope: Namespaced
  versions:
    - name: v2alpha2
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                minMember:         { type: integer }
                queue:             { type: string }
                priorityClassName: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
