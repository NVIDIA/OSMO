#
# Backend-cluster deployment: TaskGroup Controller + session client. Phones home (gRPC
# outbound) to the control cluster's Operator Service. No inbound exposure.
#
# Prerequisites (applied via kustomization.yaml):
#   - namespace osmo-system
#   - OSMOTaskGroup CRD (config/crd/workflow.osmo.nvidia.com_osmotaskgroups.yaml)
#   - KAI PodGroup CRD if you intend to run the kai runtime (deploy/dev/kai-podgroup-crd.yaml)
#
# Before applying, replace:
#   - CHANGEME_OPERATOR_ENDPOINT — e.g. operator.osmo.example.com:9000 (the control
#     cluster's Operator Service Service / Ingress).
#   - CHANGEME_CLUSTER_ID — must match an OSMOCluster.metadata.name on the control side.
#
# The bearer token Secret (`taskgroup-cluster-token`) is provisioned out-of-band with the
# raw token; the matching SHA-256 hash lives in the control cluster only. See
# cluster-registration.yaml for the registration ritual.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: taskgroup-backend
  namespace: osmo-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: taskgroup-backend
rules:
  - apiGroups: ["workflow.osmo.nvidia.com"]
    resources: ["osmotaskgroups", "osmotaskgroups/status", "osmotaskgroups/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["scheduling.kai.run.ai"]
    resources: ["podgroups"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: taskgroup-backend
subjects:
  - kind: ServiceAccount
    name: taskgroup-backend
    namespace: osmo-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: taskgroup-backend

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskgroup-backend
  namespace: osmo-system
  labels:
    app.kubernetes.io/name: taskgroup-backend
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taskgroup-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskgroup-backend
    spec:
      serviceAccountName: taskgroup-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: nvcr.io/nvstaging/osmo/taskgroup-controller:v0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --enable-workflow-controller=false
            - --enable-taskgroup-controller=true
            - --taskgroup-namespace=osmo-workflows
            - --operator-endpoint=CHANGEME_OPERATOR_ENDPOINT:9000
            - --cluster-id=CHANGEME_CLUSTER_ID
            - --cluster-token-file=/var/run/secrets/osmo/token
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - { name: metrics, containerPort: 8080 }
            - { name: probes,  containerPort: 8081 }
          livenessProbe:
            httpGet: { path: /healthz, port: probes }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: probes }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: token
              mountPath: /var/run/secrets/osmo
              readOnly: true
      volumes:
        - name: token
          secret:
            secretName: taskgroup-cluster-token
            items:
              - { key: token, path: token }
