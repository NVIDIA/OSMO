# Extra RBAC for the taskgroup-backend ServiceAccount to watch + manage
# Ray and NIM runtime CRDs alongside the standard Pod/PodGroup permissions
# from the base taskgroup-backend ClusterRole.
#
# Applied to: osmo-prod-backend (and any other backend cluster that runs
# the v0.2.0+ taskgroup controller with NIM + Ray runtime plugins).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: taskgroup-backend-runtimes
rules:
  - apiGroups: ["ray.io"]
    resources: ["rayjobs", "rayclusters", "rayservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps.nvidia.com"]
    resources: ["nimservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: taskgroup-backend-runtimes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: taskgroup-backend-runtimes
subjects:
  - kind: ServiceAccount
    name: taskgroup-backend
    namespace: osmo-exp
