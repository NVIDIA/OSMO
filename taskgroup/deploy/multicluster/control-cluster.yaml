#
# Control-cluster deployment.
#
# Workloads:
#   - taskgroup-apiserver: stateless HTTP API for submitting OSMOWorkflow CRs.
#   - taskgroup-control:   Workflow Controller + embedded Operator Service (gRPC server
#                          that accepts session streams from backend clusters).
#
# Prerequisites:
#   1. Namespace + CRDs + control-side RBAC (applied via kustomization.yaml).
#   2. For every backend cluster you want to dispatch to, apply
#      cluster-registration.yaml with the right OSMOCluster name and SHA-256 token hash.
#
# Backend reachability:
#   The Service below is type LoadBalancer to give backend clusters a reachable address.
#   In environments without an external LB controller, switch to NodePort. For HTTP/2 +
#   TLS termination at the edge, use the Ingress template at the bottom (commented).

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskgroup-control
  namespace: osmo-system
  labels:
    app.kubernetes.io/name: taskgroup-control
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taskgroup-control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskgroup-control
    spec:
      serviceAccountName: taskgroup-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: nvcr.io/nvstaging/osmo/taskgroup-controller:v0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --taskgroup-namespace=osmo-workflows
            - --enable-workflow-controller=true
            - --enable-taskgroup-controller=false
            - --operator-serve-bind=:9000
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --leader-elect=false
          ports:
            - { name: metrics, containerPort: 8080 }
            - { name: probes,  containerPort: 8081 }
            - { name: grpc,    containerPort: 9000 }
          livenessProbe:
            httpGet: { path: /healthz, port: probes }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: probes }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskgroup-apiserver
  namespace: osmo-system
  labels:
    app.kubernetes.io/name: taskgroup-apiserver
    app.kubernetes.io/component: apiserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taskgroup-apiserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskgroup-apiserver
        app.kubernetes.io/component: apiserver
    spec:
      serviceAccountName: taskgroup-apiserver
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: apiserver
          image: nvcr.io/nvstaging/osmo/taskgroup-apiserver:v0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --bind=:8088
            - --workflow-namespace=osmo-workflows
          ports:
            - { name: http, containerPort: 8088 }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true

---
# Cluster-internal service for the API server. The AWS ALB Ingress below fronts this
# Service at vpan-dev.osmo.nvidia.com with TLS terminated at the ALB.
apiVersion: v1
kind: Service
metadata:
  name: taskgroup-apiserver
  namespace: osmo-system
  labels:
    app.kubernetes.io/name: taskgroup-apiserver
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8088, targetPort: http, protocol: TCP }
  selector:
    app.kubernetes.io/name: taskgroup-apiserver

---
# Internal AWS ALB exposing the apiserver at https://vpan-dev.osmo.nvidia.com.
# Joins the shared "osmo2" ALB via IngressGroup so we don't allocate a new LB.
# Requires the AWS Load Balancer Controller installed in the cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskgroup-apiserver
  namespace: osmo-system
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/group.name: osmo2
    alb.ingress.kubernetes.io/group.order: "50"
    alb.ingress.kubernetes.io/certificate-arn: REPLACE_WITH_ACM_CERT_ARN
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
spec:
  ingressClassName: alb
  rules:
    - host: vpan-dev.osmo.nvidia.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: taskgroup-apiserver
                port:
                  number: 8088

---
# Operator Service — backend clusters dial this from outside the cluster. ClusterIP
# because the AWS ALB Ingress below provides the external entry point.
apiVersion: v1
kind: Service
metadata:
  name: taskgroup-operator
  namespace: osmo-system
  labels:
    app.kubernetes.io/name: taskgroup-operator
spec:
  type: ClusterIP
  ports:
    - { name: grpc, port: 9000, targetPort: grpc, protocol: TCP }
  selector:
    app.kubernetes.io/name: taskgroup-control

---
# AWS ALB Ingress for the operator gRPC stream. Joins the same osmo2 IngressGroup as
# the apiserver Ingress above, so backends can reach both apiserver (HTTP/1.1) and
# operator (HTTP/2 gRPC) at the same host via path-based routing. Lower group.order
# wins on path matching, and our path is more specific than `/` so this rule fires
# first for ClusterSession traffic.
#
# Requires the AWS Load Balancer Controller v2.4+ (for backend-protocol-version: GRPC).
# Health check goes to the controller's :8081 /healthz instead of the gRPC port so we
# don't need a grpc_health_v1.Health service implemented on the operator.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskgroup-operator
  namespace: osmo-system
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/group.name: osmo2
    alb.ingress.kubernetes.io/group.order: "40"
    alb.ingress.kubernetes.io/certificate-arn: REPLACE_WITH_ACM_CERT_ARN
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/backend-protocol-version: GRPC
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-port: "8081"
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
spec:
  ingressClassName: alb
  rules:
    - host: vpan-dev.osmo.nvidia.com
      http:
        paths:
          - path: /osmo.taskgroup.v1alpha1.ClusterSession/
            pathType: Prefix
            backend:
              service:
                name: taskgroup-operator
                port:
                  number: 9000
