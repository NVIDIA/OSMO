# Task Runtime Environment Test (OETF 3-file pattern)
#
# Validates the container environment is properly configured by running
# in-task assertions (DNS, env vars, mounts, image pin).
#
# Catches bugs that status-only testing misses:
#   - Logger unreachable (NVBugs 5887595)
#   - Broken mounts (NVBugs 5968974)
#   - Missing env vars (NVBugs 5933448)
#
# task_fixture.py and task.py are injected by the OETF executor at submission time.

version: 2
workflow:
  name: oetf-task-runtime-environment-{{test_id}}
  timeout:
    exec_timeout: 5m
    queue_timeout: 30m
  resources:
    default:
      cpu: 1
      memory: 1Gi
      storage: 1Gi
  tasks:
  - name: check
    image: python:3.10-slim
    command: ["python3"]
    args: ["/tmp/oetf/task.py"]
    resource: default
    outputs:
    - dataset:
        name: "{{bucket}}/oetf-task-runtime-environment-probe"

default-values:
  bucket: osmo
  test_id: "0"
