version: 2
workflow:
  name: app-cli
  resources:
    default:
      cpu: 1
      storage: 1Gi
      memory: 1Gi
  tasks:
  - name: app-cli
    image: ubuntu:22.04
    resource: default
    args: ['/tmp/osmo_app_test.sh', '{{app_name}}']
    command: ['/bin/bash']
    files:
    - localpath: scripts/app_cli.sh
      path: /tmp/osmo_app_test.sh
    - localpath: scripts/app_spec.yaml
      path: /tmp/app_spec.yaml
  timeout:
    exec_timeout: 10m
    queue_timeout: 1h

default-values:
  app_name: integration_test_app
