version: 2
workflow:
  name: bad-resource-v2
  resources:
    default:
      cpu: {{cpu}}
      storage: {{storage}}
      memory: {{memory}}
      platform: {{platform}}

  tasks:
  - name: task1
    image: ubuntu:22.04
    args: ['hello']
    command: ['echo']
    resource: default
  timeout:
    exec_timeout: 1m
    queue_timeout: 1h

default-values:
  platform: ovx-l40
  cpu: 1
  storage: 1Gi
  memory: 1Gi
