version: 2
workflow:
  name: data-cli
  resources:
    default:
      cpu: 1
      storage: 1Gi
      memory: 1Gi
      platform: {{platform}}
  tasks:
  - name: data-cli
    image: ubuntu:22.04
    resource: default
    args: ['/tmp/osmo_data_test.sh']
    command: ['/bin/bash']
    files:
    - contents: |
        set -euo pipefail

        osmo data --help >/tmp/data_help.txt
        osmo data upload --help >/tmp/data_upload_help.txt
        osmo data download --help >/tmp/data_download_help.txt
        osmo data list --help >/tmp/data_list_help.txt
        osmo data delete --help >/tmp/data_delete_help.txt

        grep -q "upload" /tmp/data_help.txt
        grep -q "download" /tmp/data_help.txt
        grep -q "list" /tmp/data_help.txt
        grep -q "delete" /tmp/data_help.txt
      path: /tmp/osmo_data_test.sh
  timeout:
    exec_timeout: 10m
    queue_timeout: 1h

default-values:
  platform: cpu-x86
