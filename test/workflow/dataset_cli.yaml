version: 2
workflow:
  name: dataset-cli
  resources:
    default:
      cpu: 1
      storage: 1Gi
      memory: 1Gi
  tasks:
  - name: dataset-cli
    image: ubuntu:22.04
    resource: default
    args: ['/tmp/osmo_dataset_test.sh', '{{bucket}}']
    command: ['/bin/bash']
    files:
    - localpath: scripts/dataset_cli.sh
      path: /tmp/osmo_dataset_test.sh
    - localpath: scripts/dataset_query.txt
      path: /tmp/dataset_query.txt
    - localpath: scripts/collection_query.txt
      path: /tmp/collection_query.txt
  timeout:
    exec_timeout: 10m
    queue_timeout: 1h
default-values:
  bucket: osmo
