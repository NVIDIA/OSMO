version: 2
workflow:
  name: sleep-workflow
  resources:
    default:
      cpu: 1
      storage: 1Gi
      memory: 1Gi
      platform: {{platform}}
  tasks:
  - name: task1
    image: ubuntu:22.04
    args: ['$(FILE_PATH)']
    command: ['sh']
    environment:
      FILE_PATH: /tmp/run.sh
    files:
    - contents: |
        echo "Sleeping from pod $(hostname), waiting for timeout..."
        sleep 1000
      path: /tmp/run.sh
    resource: default
  timeout:
    exec_timeout: 2m
    queue_timeout: 1h
