workflow:
  name: exit-actions
  resources:
    default:
      cpu: 1
      storage: 1Gi
      memory: 1Gi
      platform: {{platform}}
  tasks:
  - name: test
    image: ubuntu:22.04
    command: [/bin/sh]
    args: [/tmp/run.sh]
    files:
    - contents: |
        echo hello
        exit {{code}}
      path: /tmp/run.sh

    exitActions:
       COMPLETE: 15
  timeout:
    exec_timeout: 10m
    queue_timeout: 1h
default-values:
  platform: cpu-x86
  code: 15
