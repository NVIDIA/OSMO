version: 2
workflow:
  name: {{workflow_name}}
  resources:
    default:
      cpu: 1
      storage: 1Gi
      memory: 1Gi
  tasks:
  - name: prepare-folder-input
    image: ubuntu:22.04
    resource: default
    args: ['/tmp/run.sh']
    command: ['/bin/bash']
    files:
    - contents: |
        set -euo pipefail

        mkdir -p {{output}}/{{workflow_name}}/input/folder_input_0
        mkdir -p {{output}}/{{workflow_name}}/input/folder_input_1
        echo "test_file_content" > {{output}}/{{workflow_name}}/input/folder_input_0/test_file.txt
        echo "test_file_content" > {{output}}/{{workflow_name}}/input/folder_input_1/test_file.txt
      path: /tmp/run.sh

  - name: validate-folder-inputs
    image: ubuntu:22.04
    resource: default
    args: ['/tmp/run.sh']
    command: ['/bin/bash']
    files:
    - contents: |
        set -euo pipefail

        ls -alR {{input:0}}

        input_path_1={{input:0}}/{{workflow_name}}/input/folder_input_0
        input_path_2={{input:0}}/{{workflow_name}}/input/folder_input_1

        for input_path in $input_path_1 $input_path_2; do
          echo "Validating input_path: $input_path"

          if [ ! -d "$input_path" ]; then
            echo "Error: $input_path directory does not exist"
            exit 1
          fi

          if [ ! -f "$input_path/test_file.txt" ]; then
            echo "Error: $input_path/test_file.txt does not exist"
            exit 1
          fi

          if [ "$(cat "$input_path/test_file.txt")" != "test_file_content" ]; then
            echo "Error: $input_path/test_file.txt does not contain the expected content"
            exit 1
          fi

          echo "Successfully validated input_path: $input_path"
        done
      path: /tmp/run.sh
    inputs:
    - task: prepare-folder-input

  - name: select-folder-input
    image: ubuntu:22.04
    resource: default
    args: ['/tmp/run.sh']
    command: ['/bin/bash']
    files:
    - contents: |
        set -euo pipefail

        mkdir -p {{output}}/{{workflow_name}}
        cp -R {{input:0}}/{{workflow_name}}/input/folder_input_1 {{output}}/{{workflow_name}}/folder_input_1
      path: /tmp/run.sh
    inputs:
    - task: prepare-folder-input

  - name: validate-selected-folder-input
    image: ubuntu:22.04
    resource: default
    args: ['/tmp/run.sh']
    command: ['/bin/bash']
    files:
    - contents: |
        set -euo pipefail

        ls -alR {{input:0}}

        input_path={{input:0}}/{{workflow_name}}/folder_input_1
        invalid_input_path={{input:0}}/{{workflow_name}}/folder_input_0

        if [ ! -d "$input_path" ]; then
          echo "Error: $input_path directory does not exist"
          exit 1
        fi

        if [ ! -f "$input_path/test_file.txt" ]; then
          echo "Error: $input_path/test_file.txt does not exist"
          exit 1
        fi

        if [ "$(cat "$input_path/test_file.txt")" != "test_file_content" ]; then
          echo "Error: $input_path/test_file.txt does not contain the expected content"
          exit 1
        fi

        if [ -d "$invalid_input_path" ]; then
          echo "Error: $invalid_input_path directory should not exist"
          exit 1
        fi

        echo "Successfully validated selected folder input"
      path: /tmp/run.sh
    inputs:
    - task: select-folder-input
  timeout:
    exec_timeout: 10m
    queue_timeout: 1h

default-values:
  workflow_name: folder-input-test
