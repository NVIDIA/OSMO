version: 2
workflow:
  name: osmo-client-test
  resources:
    default:
      cpu: 1
      storage: 1Gi
      memory: 1Gi
      platform: {{platform}}
  tasks:
  - name: task1
    resource: default
    image: ubuntu:22.04
    args: ['/tmp/run.sh']
    command: ['sh']
    files:
    - contents: |
        set -e
        echo "Running osmo dataset list"
        osmo dataset list --all-users --name test_DS
      path: /tmp/run.sh
  timeout:
    queue_timeout: 1h
    exec_timeout: 10m
