version: 2
workflow:
  groups:
  - name: echo
    tasks:
    - args:
      - /tmp/server.sh
      command:
      - /bin/sh
      files:
      - localpath: scripts/server.sh
        path: /tmp/server.sh
      - contents: |-
          hello
        path: /tmp/hello.txt
      image: busybox
      lead: true
      name: server
      resource: default
    - args:
      - /tmp/client.sh
      command:
      - /bin/sh
      files:
      - localpath: scripts/client.sh
        path: /tmp/client.sh
      image: busybox
      name: client
      resource: default
  name: parallel-workflow-mount
  resources:
    default:
      cpu: 1
      memory: 1Gi
      storage: 1Gi
  timeout:
    exec_timeout: 10m
    queue_timeout: 1h
default-values:
