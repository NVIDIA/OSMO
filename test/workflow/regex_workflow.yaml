version: 2
workflow:
  name: regex-workflow
  resources:
    default:
      cpu: 1
      storage: 1Gi
      memory: 1Gi
      platform: {{platform}}
  tasks:
  - name: create-files
    image: ubuntu:22.04
    command: [sh]
    args: [/tmp/run.sh]
    files:
    - contents: |
        set -e

        mkdir -p {{output}}/source/inside
        echo "Hello from create"
        echo "Hello from create" > {{output}}/source/t.txt
        echo "Data from task 1" > {{output}}/source/t1.txt
        echo "Data from task 1" > {{output}}/source/bad.my
        echo "Data from task 1" > {{output}}/source/inside/t2.txt

        mkdir -p {{output}}/regex_test_DS/inside
        cp {{output}}/source/t.txt {{output}}/regex_test_DS/t.txt
        cp {{output}}/source/t1.txt {{output}}/regex_test_DS/t1.txt
        cp {{output}}/source/inside/t2.txt {{output}}/regex_test_DS/inside/t2.txt
      path: /tmp/run.sh
    resource: default
  - name: download-files
    image: ubuntu:22.04
    args: ['$(FILE_PATH)']
    command: ['sh']
    environment:
      FILE_PATH: /tmp/run.sh
    files:
    - contents: |
        set -e

        ls -R {{input:0}}

        mkdir -p /tmp/test/inside
        echo "Hello from create" > /tmp/test/t.txt
        echo "Data from task 1" > /tmp/test/t1.txt
        echo "Data from task 1" > /tmp/test/inside/t2.txt

        diff -qr {{input:0}}/regex_test_DS /tmp/test/
        if [ -f "{{input:0}}/regex_test_DS/bad.my" ]; then
          echo "Filtered output unexpectedly included bad.my"
          exit 1
        fi
      path: /tmp/run.sh
    resource: default
    inputs:
    - task: create-files
  timeout:
    exec_timeout: 10m
    queue_timeout: 1h

default-values:
  platform: cpu-x86
