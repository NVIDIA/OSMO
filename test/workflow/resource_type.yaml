version: 2
workflow:
  name: resource-type-byte
  resources:
    default:
      cpu: 1
      storage: 5368709120 # 5Gi
      memory: 1073741824 # 1Gi
  tasks:
  - name: task1
    resource: default
    image: ubuntu:22.04
    command: ['sh']
    args: [/tmp/run.sh]
    files:
    - contents: |
        echo "Hello from task $(hostname)"
      path: /tmp/run.sh
    resource: default
  timeout:
    queue_timeout: 1h
    exec_timeout: 1m
