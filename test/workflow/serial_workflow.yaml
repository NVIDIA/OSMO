version: 2
workflow:
  name: serial-workflow
  resources:
    default:
      cpu: 1
      storage: 1Gi
      memory: 1Gi
  tasks:
  - name: task1
    image: ubuntu:22.04
    command: [sh]
    args: [/tmp/run.sh]
    files:
    - contents: |
        echo "Hello from task1 $(hostname)"
        echo "Hello from task1 $(hostname)" > {{output}}/hello1.txt
        echo "Data from task 1" > {{output}}/test_read.txt
      path: /tmp/run.sh
    resource: default
  - name: task2
    image: ubuntu:22.04
    args: ['$(FILE_PATH)']
    command: ['sh']
    environment:
      FILE_PATH: /tmp/run.sh
    files:
    - contents: |
        echo "Hello from task2 {{output}}"
        if [ ! -f "{{input:0}}/test_read.txt" ]; then
            echo "Error: {{input:0}}/test_read.txt does not exist"
            exit 1
        fi
        head -1 {{input:0}}/test_read.txt
        echo "Data from task 2" > {{output}}/test_read.txt
      path: /tmp/run.sh
    resource: default
    inputs:
    - task: task1
  - name: task3
    image: ubuntu:22.04
    command: ['sh']
    args: ['/tmp/run.sh']
    files:
    - contents: |
        echo "Reading from task 2"
        if [ ! -f "{{input:1}}/test_read.txt" ]; then
            echo "Error: {{input:1}}/test_read.txt does not exist"
            exit 1
        fi
        while IFS= read -r line; do
          echo "a line: $line"
        done < {{input:1}}/test_read.txt
        cp {{input:1}}/test_read.txt {{output}}/task2_hello.txt
        echo "Hello from task3 $(hostname)"
        mkdir {{output}}/out3
        echo "Hello from task3 $(hostname)" > {{output}}/out3/hello3.txt
      path: /tmp/run.sh
    resource: default
    inputs:
    - task: task1
    - task: task2
  timeout:
    exec_timeout: 10m
    queue_timeout: 1h
