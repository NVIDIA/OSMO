version: 2
workflow:
  name: serial-workflow-multi-arch
  resources:
    jetson:
      cpu: 4
      storage: 10Gi
      memory: 4Gi
      platform: agx-orin-jp6
    ovx:
      cpu: 4
      storage: 10Gi
      memory: 4Gi
      platform: cpu-x86
  tasks:
  - name: task1
    image: ubuntu:22.04
    command: [sh]
    args: [/tmp/run.sh]
    files:
    - contents: |
        echo "Hello from task1 $(hostname)"
        echo "Hello from task1 $(hostname)" > {{output}}/hello1.txt
        echo "Data from task 1" > {{output}}/test_read.txt
      path: /tmp/run.sh
    - path: '{{output}}/metadata.yaml'
      contents: |
        id: {{workflow_id}}
    resource: jetson
    outputs:
    - dataset:
        name: workflow_test_DS
        metadata:
        - metadata.yaml
  - name: task2
    image: ubuntu:22.04
    args: ['$(FILE_PATH)']
    command: ['sh']
    environment:
      FILE_PATH: /tmp/run.sh
    files:
    - contents: |
        echo "Hello from task2 {{output}}"
        if [ ! -f "{{input:1}}/workflow_test_DS/test_read.txt" ]; then
            echo "Error: {{input:1}}/workflow_test_DS/test_read.txt does not exist"
            exit 1
        fi
        head -1 {{input:1}}/workflow_test_DS/test_read.txt
        echo "Data from task 2" > {{output}}/test_read.txt
      path: /tmp/run.sh
    resource: ovx
    inputs:
    - task: task1
    - dataset:
        name: workflow_test_DS
    outputs:
    - dataset:
        name: workflow_test_DS:test
  timeout:
    exec_timeout: 10m
    queue_timeout: 1h
