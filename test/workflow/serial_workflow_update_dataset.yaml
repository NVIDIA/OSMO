version: 2
workflow:
  name: serial-workflow-update-dataset
  resources:
    default:
      cpu: 1
      storage: 1Gi
      memory: 1Gi
      platform: {{platform}}
  tasks:
  - name: task0
    image: ubuntu:22.04
    command: [sh]
    args: [/tmp/run.sh]
    files:
    - contents: |
        echo "Hello from task0 $(hostname)"
        echo "Data from task 0" > {{output}}/t0_read.txt
      path: /tmp/run.sh
    resource: default
    outputs:
    # Creates a new dataset with workflow_update_DS:{{workflow_id}}
    - dataset:
        name: {{bucket}}/workflow_update_DS:{{workflow_id}}
  - name: task1
    image: ubuntu:22.04
    command: [sh]
    args: [/tmp/run.sh]
    files:
    - contents: |
        echo "Hello from task1 $(hostname)"
        echo "Hello from task1 $(hostname)" > {{output}}/hello1.txt
        echo "Data from task 1" > {{output}}/test_read.txt
      path: /tmp/run.sh
    - path: '{{output}}/metadata.yaml'
      contents: |
        id: {{workflow_id}}
    resource: default
    inputs:
    - task: task0
    outputs:
    - update_dataset:
        name: {{bucket}}/workflow_update_DS:{{workflow_id}}
        metadata:
        - metadata.yaml
  - name: task2
    image: ubuntu:22.04
    args: ['$(FILE_PATH)']
    command: ['sh']
    environment:
      FILE_PATH: /tmp/run.sh
    files:
    - contents: |
        echo "Hello from task2"
        if [ ! -f "{{input:1}}/workflow_update_DS/test_read.txt" ]; then
            echo "Error: {{input:1}}/workflow_update_DS/test_read.txt does not exist"
            exit 1
        fi
        head -1 {{input:1}}/workflow_update_DS/test_read.txt
        mkdir {{output}}/t2
        echo "Data from task 2" > {{output}}/t2/test_read.txt
      path: /tmp/run.sh
    resource: default
    inputs:
    - task: task1
    - dataset:
        name: {{bucket}}/workflow_update_DS:{{workflow_id}}
    outputs:
    # Creates a new dataset version from the previous dataset with
    # workflow_update_DS:{{workflow_id}}
    - update_dataset:
        name: {{bucket}}/workflow_update_DS:{{workflow_id}}
        paths:
        - t2/test_read.txt:f2
  - name: task3
    image: ubuntu:22.04
    command: ['sh']
    args: ['/tmp/run.sh']
    files:
    - contents: |
        echo "Reading from task 2"
        if [ ! -f "{{input:1}}/t2/test_read.txt" ]; then
            echo "Error: {{input:1}}/t2/test_read.txt does not exist"
            exit 1
        fi
        while IFS= read -r line; do
          echo "a line: $line"
        done < {{input:1}}/t2/test_read.txt
        cp {{input:1}}/t2/test_read.txt {{output}}/task2_hello.txt

        echo "Reading from Task 1 update DS"
        if [ ! -f "{{input:2}}/workflow_update_DS/test_read.txt" ]; then
            echo "Error: {{input:2}}/workflow_update_DS/test_read.txt does not exist"
            exit 1
        fi
        head -1 {{input:2}}/workflow_update_DS/test_read.txt
        echo "Reading from Task 2 update DS"
        if [ ! -f "{{input:2}}/workflow_update_DS/f2/test_read.txt" ]; then
            echo "Error: {{input:2}}/workflow_update_DS/f2/test_read.txt does not exist"
            exit 1
        fi
        head -1 {{input:2}}/workflow_update_DS/f2/test_read.txt

        echo "Hello from task3 $(hostname)"
        mkdir {{output}}/out3
        echo "Hello from task3 $(hostname)" > {{output}}/out3/hello3.txt
      path: /tmp/run.sh
    resource: default
    inputs:
    - task: task1
    - task: task2
    - dataset:
        name: {{bucket}}/workflow_update_DS:{{workflow_id}}
  timeout:
    exec_timeout: 10m
    queue_timeout: 1h
default-values:
  bucket: osmo
