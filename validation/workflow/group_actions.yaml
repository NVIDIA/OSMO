workflow:
  name: group_action
  groups:
  - name: my_group
    ignoreNonleadStatus: {{ ignore_nonlead_status }}
    tasks:
    - name: task1
      image: ubuntu
      command: [bash]
      args: [/tmp/run.sh]
      files:
      - contents: |
          echo hello
          sleep 120
        path: /tmp/run.sh
      lead: true
    - name: task2
      image: ubuntu
      command: [bash]
      args: [/tmp/run.sh]
      files:
      - contents: |
          echo hello
          sleep 10
          exit 3
        path: /tmp/run.sh
  timeout:
    exec_timeout: 10m
    queue_timeout: 1h

default-values:
  ignore_nonlead_status: false
