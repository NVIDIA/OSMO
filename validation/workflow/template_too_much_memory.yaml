# This template will usage a huge amount of memory, and should fail
version: 2
workflow:
  name: template-too-much-memory
  tasks:
  - name: task1
    image:  ubuntu:22.04
    command:
    - /bin/bash
    - -c
    - |
        {% set x = "ABCDABCDABCDABCD" %}
        {%- for i in range(10000) -%}
        {%- for j in range(10000) -%}
        {%- for k in range(10000) -%}
        {%- for l in range(10000) -%}
        {%- set x = x + x -%}
        {%- endfor -%}
        {%- endfor -%}
        {%- endfor -%}
        {%- endfor -%}

  timeout:
    exec_timeout: 5m
    queue_timeout: 1h
